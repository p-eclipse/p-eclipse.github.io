<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가설 설정 OX 퀴즈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Black+Han+Sans&display=swap');

  :root {
    --bg: #F0F4FF;
    --card: #ffffff;
    --primary: #3B5BDB;
    --primary-light: #EDF2FF;
    --correct: #2F9E44;
    --correct-bg: #EBFBEE;
    --wrong: #E03131;
    --wrong-bg: #FFF5F5;
    --neutral: #868E96;
    --text: #1A1B1E;
    --text-soft: #495057;
    --shadow: 0 4px 24px rgba(59,91,219,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
    color: var(--text);
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .header .badge {
    display: inline-block;
    background: var(--primary);
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(26px, 5vw, 38px);
    color: var(--primary);
    line-height: 1.2;
  }

  .header p {
    margin-top: 8px;
    font-size: 14px;
    color: var(--text-soft);
  }

  /* Progress */
  .progress-wrap {
    width: 100%;
    max-width: 620px;
    margin-bottom: 24px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-soft);
    margin-bottom: 8px;
  }

  .progress-bar {
    width: 100%;
    height: 8px;
    background: #D0D7F7;
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  /* Card */
  .card {
    width: 100%;
    max-width: 620px;
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 36px 32px 28px;
    animation: fadeUp 0.35s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }

  .q-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
    margin-bottom: 10px;
  }

  .hypothesis-box {
    background: var(--primary-light);
    border-left: 4px solid var(--primary);
    border-radius: 8px;
    padding: 16px 20px;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 28px;
    min-height: 72px;
    display: flex;
    align-items: center;
  }

  /* OX Buttons */
  .btn-row {
    display: flex;
    gap: 16px;
  }

  .btn-ox {
    flex: 1;
    height: 72px;
    border: none;
    border-radius: 14px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 30px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    outline: none;
    position: relative;
    overflow: hidden;
  }

  .btn-ox:active { transform: scale(0.96); }

  .btn-o {
    background: #EBFBEE;
    color: var(--correct);
    border: 2.5px solid #B2F2BB;
  }
  .btn-o:hover { background: #D3F9D8; border-color: var(--correct); box-shadow: 0 4px 16px rgba(47,158,68,0.18); }

  .btn-x {
    background: #FFF5F5;
    color: var(--wrong);
    border: 2.5px solid #FFC9C9;
  }
  .btn-x:hover { background: #FFE3E3; border-color: var(--wrong); box-shadow: 0 4px 16px rgba(224,49,49,0.18); }

  /* Feedback */
  .feedback {
    margin-top: 22px;
    border-radius: 12px;
    padding: 18px 20px;
    display: none;
    animation: fadeUp 0.25s ease;
  }

  .feedback.correct {
    background: var(--correct-bg);
    border: 1.5px solid #B2F2BB;
    display: block;
  }

  .feedback.wrong {
    background: var(--wrong-bg);
    border: 1.5px solid #FFC9C9;
    display: block;
  }

  .feedback-top {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .feedback.correct .feedback-top { color: var(--correct); }
  .feedback.wrong .feedback-top { color: var(--wrong); }

  .feedback-reason {
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.65;
  }

  .feedback-reason strong {
    color: var(--text);
  }

  /* Next Button */
  .btn-next {
    margin-top: 22px;
    width: 100%;
    height: 52px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-next:hover { background: #2F4AC0; }
  .btn-next:active { transform: scale(0.98); }

  /* Result Screen */
  .result-card {
    width: 100%;
    max-width: 620px;
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 48px 32px;
    text-align: center;
    display: none;
    animation: fadeUp 0.4s ease;
  }

  .result-emoji {
    font-size: 64px;
    margin-bottom: 16px;
  }

  .result-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 30px;
    color: var(--primary);
    margin-bottom: 12px;
  }

  .score-display {
    font-size: 52px;
    font-weight: 900;
    color: var(--primary);
    letter-spacing: -2px;
    margin: 20px 0 6px;
  }

  .score-display span {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-soft);
  }

  .score-msg {
    font-size: 15px;
    color: var(--text-soft);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .btn-retry {
    padding: 14px 40px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-retry:hover { background: #2F4AC0; }

  /* Summary table */
  .wrong-list {
    margin-top: 32px;
    text-align: left;
  }

  .wrong-list h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--wrong);
    margin-bottom: 12px;
  }

  .wrong-item {
    background: var(--wrong-bg);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 10px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-soft);
  }

  .wrong-item strong {
    color: var(--text);
    display: block;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="badge">중1 과학 탐구</div>
  <h1>가설 설정 OX 퀴즈</h1>
  <p>다음 가설이 적합한지 판단해 보세요!</p>
</div>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="prog-text">1 / 20</span>
    <span id="score-text">점수: 0</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="prog-fill" style="width:5%"></div>
  </div>
</div>

<div class="card" id="quiz-card">
  <div class="q-num" id="q-num">문제 01</div>
  <div class="q-label">📌 다음 가설은 적합한가요?</div>
  <div class="hypothesis-box" id="hypothesis-text"></div>

  <div class="btn-row">
    <button class="btn-ox btn-o" id="btn-o" onclick="answer('O')">⭕</button>
    <button class="btn-ox btn-x" id="btn-x" onclick="answer('X')">❌</button>
  </div>

  <div class="feedback" id="feedback">
    <div class="feedback-top" id="feedback-top"></div>
    <div class="feedback-reason" id="feedback-reason"></div>
  </div>

  <button class="btn-next" id="btn-next" onclick="nextQ()">다음 문제 →</button>
</div>

<div class="result-card" id="result-card">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title">퀴즈 완료!</div>
  <div class="score-display" id="score-final"></div>
  <div class="score-msg" id="score-msg"></div>

  <div class="wrong-list" id="wrong-list"></div>

  <button class="btn-retry" onclick="restart()">🔄 다시 풀기</button>
</div>

<script>
const questions = [
  { text: "물의 온도가 높을수록 설탕이 더 빨리 녹을 것이다.", answer: "O",
    reason: "✅ <strong>적합한 가설입니다.</strong> '물의 온도'라는 측정 가능한 변인과 '빨리 녹는다'는 방향성 있는 예측이 모두 포함되어 있습니다." },
  { text: "비료의 양이 많을수록 식물이 더 빠르게 자랄 것이다.", answer: "O",
    reason: "✅ <strong>적합한 가설입니다.</strong> '비료의 양'(조작 변인)과 '빠르게 자람'(결과 예측)이 명확하고 측정 가능하게 제시되어 있습니다." },
  { text: "좋은 비료를 사용하면 식물이 더 빠르게 자랄 것이다.", answer: "X",
    reason: "❌ <strong>부적합한 가설입니다.</strong> '좋은 비료'는 어떤 기준으로 '좋은'인지 알 수 없는 <strong>주관적 표현</strong>입니다. '질소 함량이 높은', '양이 많은' 등으로 바꿔야 합니다." },
  { text: "습도가 높을수록 빨래가 마르는 데 걸리는 시간이 더 길 것이다.", answer: "O",
    reason: "✅ <strong>적합한 가설입니다.</strong> '습도'라는 측정 가능한 변인과 '마르는 시간이 길어진다'는 방향성 있는 예측이 포함되어 있습니다." },
  { text: "행복한 환경에서 키운 금붕어가 더 오래 살 것이다.", answer: "X",
    reason: "❌ <strong>부적합한 가설입니다.</strong> '행복한 환경'은 금붕어 입장에서도, 사람 입장에서도 기준이 없어 <strong>측정이 불가능한 주관적 표현</strong>입니다." },
  { text: "음료수의 종류에 따라 얼음이 녹는 정도가 다를 것이다.", answer: "X",
    reason: "❌ <strong>부적합한 가설입니다.</strong> '다를 것이다'는 어떤 방향으로 다른지 예측하지 않아 <strong>방향성이 없습니다.</strong> '탄산음료가 물보다 얼음이 더 빨리 녹을 것이다'처럼 구체적으로 바꿔야 합니다." },
  { text: "소금의 양이 많을수록 물이 끓기 시작하는 온도가 더 높아질 것이다.", answer: "O",
    reason: "✅ <strong>적합한 가설입니다.</strong> '소금의 양'과 '끓는 온도' 모두 측정 가능하고, 방향성 있는 예측이 담겨 있습니다." },
  { text: "천의 펼쳐진 면적이 넓을수록 빨래가 더 빨리 마를 것이다.", answer: "O",
    reason: "✅ <strong>적합한 가설입니다.</strong> '펼쳐진 면적'(조작 변인)과 '마르는 속도'(반응 변인)가 모두 측정 가능합니다." },
  { text: "물의 온도에 따라 설탕이 녹는 속도가 다를 것이다.", answer: "X",
    reason: "❌ <strong>부적합한 가설입니다.</strong> '다를 것이다'는 방향을 말하지 않습니다. '물의 온도가 높을수록 더 빨리 녹을 것이다'처럼 <strong>어떤 방향으로 다른지</strong> 예측해야 합니다." },
  { text: "천의 상태에 따라 건조 속도가 달라질 것이다.", answer: "X",
    reason: "❌ <strong>부적합한 가설입니다.</strong> '천의 상태'가 무엇을 의미하는지 불분명하고, '달라질 것이다'에 방향성도 없습니다. 변인을 명확히 하고 예측 방향을 구체적으로 써야 합니다." },
  { text: "맛있는 음료수일수록 얼음이 더 빨리 녹을 것이다.", answer: "X",
    reason: "❌ <strong>부적합한 가설입니다.</strong> '맛있는'은 사람마다 기준이 달라 객관적으로 측정할 수 없는 <strong>주관적 표현</strong>입니다. '당도', '용질 농도' 등 측정 가능한 표현으로 바꿔야 합니다." },
  { text: "예쁜 화분에 심은 식물이 더 잘 자랄 것이다.", answer: "X",
    reason: "❌ <strong>부적합한 가설입니다.</strong> '예쁜'은 주관적인 판단이라 과학적으로 측정할 수 없습니다. 화분의 재질, 크기 등 구체적인 변인으로 바꿔야 합니다." },
  { text: "검은색 컵의 물이 흰색 컵의 물보다 더 빨리 따뜻해질 것이다.", answer: "O",
    reason: "✅ <strong>적합한 가설입니다.</strong> 비교 대상이 명확하고, '온도가 빨리 오른다'는 방향성 있는 예측이 담겨 있습니다." },
  { text: "신선한 물을 마신 식물이 더 건강하게 자랄 것이다.", answer: "X",
    reason: "❌ <strong>부적합한 가설입니다.</strong> '신선한'과 '건강하게'는 모두 측정 기준이 없는 <strong>주관적 표현</strong>입니다. 과학적으로 정의할 수 없습니다." },
  { text: "경사면의 각도가 클수록 공이 굴러 내려오는 속도가 더 빠를 것이다.", answer: "O",
    reason: "✅ <strong>적합한 가설입니다.</strong> '경사면의 각도'(조작 변인)와 '속도'(반응 변인)가 모두 객관적으로 측정 가능합니다." },
  { text: "고무줄을 당기는 길이가 길수록 날아가는 거리가 더 길 것이다.", answer: "O",
    reason: "✅ <strong>적합한 가설입니다.</strong> '당기는 길이'와 '날아가는 거리' 모두 자로 잴 수 있어 검증 가능한 가설입니다." },
  { text: "비료의 양에 따라 식물의 성장이 달라질 것이다.", answer: "X",
    reason: "❌ <strong>부적합한 가설입니다.</strong> '달라질 것이다'는 결과를 예측하지 않고 단순히 차이가 있다는 것만 말합니다. <strong>방향성 있는 예측</strong>이 빠져 있습니다." },
  { text: "운동 방법에 따라 심박수가 달라질 것이다.", answer: "X",
    reason: "❌ <strong>부적합한 가설입니다.</strong> 어떤 운동이 심박수를 어떻게 변화시키는지 구체적인 예측이 없습니다. <strong>방향성 있는 예측</strong>이 필요합니다." },
  { text: "운동 시간이 길수록 운동 직후 심박수가 더 높아질 것이다.", answer: "O",
    reason: "✅ <strong>적합한 가설입니다.</strong> '운동 시간'과 '심박수'는 모두 수치로 측정할 수 있고, 방향성도 명확합니다." },
  { text: "햇빛을 받는 시간이 길수록 식물의 키가 더 많이 자랄 것이다.", answer: "O",
    reason: "✅ <strong>적합한 가설입니다.</strong> '햇빛을 받는 시간'과 '식물의 키'는 모두 측정 가능하고 방향성 있는 예측이 담겨 있습니다." },
];

// Shuffle
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let current = 0;
let score = 0;
let answered = false;
let wrongList = [];
let shuffled = [];

function init() {
  shuffled = [...questions];
  current = 0;
  score = 0;
  answered = false;
  wrongList = [];
  document.getElementById('quiz-card').style.display = 'block';
  document.getElementById('result-card').style.display = 'none';
  showQ();
}

function showQ() {
  const q = shuffled[current];
  answered = false;
  document.getElementById('q-num').textContent = `문제 ${String(current + 1).padStart(2, '0')}`;
  document.getElementById('hypothesis-text').textContent = q.text;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-o').disabled = false;
  document.getElementById('btn-x').disabled = false;

  // Progress
  const pct = Math.round(((current) / shuffled.length) * 100);
  document.getElementById('prog-fill').style.width = Math.max(pct, 3) + '%';
  document.getElementById('prog-text').textContent = `${current + 1} / ${shuffled.length}`;
  document.getElementById('score-text').textContent = `점수: ${score}`;
}

function answer(choice) {
  if (answered) return;
  answered = true;
  const q = shuffled[current];
  const correct = (choice === q.answer);

  if (correct) {
    score++;
    document.getElementById('feedback').className = 'feedback correct';
    document.getElementById('feedback-top').textContent = '🎯 정답!';
  } else {
    wrongList.push({ text: q.text, correct: q.answer, reason: q.reason });
    document.getElementById('feedback').className = 'feedback wrong';
    document.getElementById('feedback-top').textContent = '😅 틀렸어요!';
  }
  document.getElementById('feedback-reason').innerHTML = q.reason;

  document.getElementById('btn-o').disabled = true;
  document.getElementById('btn-x').disabled = true;
  document.getElementById('score-text').textContent = `점수: ${score}`;

  const nextBtn = document.getElementById('btn-next');
  nextBtn.style.display = 'block';
  nextBtn.textContent = current === shuffled.length - 1 ? '📊 결과 보기' : '다음 문제 →';
}

function nextQ() {
  current++;
  if (current >= shuffled.length) {
    showResult();
  } else {
    // Re-animate card
    const card = document.getElementById('quiz-card');
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'fadeUp 0.35s ease';
    showQ();
  }
}

function showResult() {
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('quiz-card').style.display = 'none';
  const rc = document.getElementById('result-card');
  rc.style.display = 'block';

  const pct = Math.round((score / shuffled.length) * 100);
  document.getElementById('score-final').innerHTML = `${score}<span> / ${shuffled.length}</span>`;

  let emoji, msg;
  if (pct >= 90) { emoji = '🏆'; msg = '완벽해요! 가설 설정의 핵심을 잘 이해하고 있어요!'; }
  else if (pct >= 70) { emoji = '😊'; msg = '잘했어요! 조금 더 연습하면 완벽해질 거예요.'; }
  else if (pct >= 50) { emoji = '🤔'; msg = '절반 이상 맞혔어요. 주관적 표현과 방향성을 다시 확인해 봐요!'; }
  else { emoji = '📚'; msg = '다시 도전해 보세요! 가설은 ① 측정 가능 ② 방향성 있는 예측이 핵심이에요.'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('score-msg').textContent = msg;

  if (wrongList.length > 0) {
    let html = `<h3>틀린 문제 (${wrongList.length}개)</h3>`;
    wrongList.forEach((w, i) => {
      html += `<div class="wrong-item"><strong>❌ ${w.text}</strong>${w.reason.replace(/<[^>]+>/g, '')}</div>`;
    });
    document.getElementById('wrong-list').innerHTML = html;
  } else {
    document.getElementById('wrong-list').innerHTML = '<p style="color:var(--correct);font-weight:700;font-size:15px;">🎉 모두 맞혔어요! 완벽합니다!</p>';
  }
}

function restart() {
  document.getElementById('result-card').style.display = 'none';
  init();
}

init();
</script>
</body>
</html>
