<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>연습게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="menu-link" href="../">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        BASE.RETURN
      </a>
      <div class="top-right">
        <div class="mode-badge">TRAINING_PROTOCOL // 01</div>
      </div>
    </div>

    <div class="title-section">
      <h1 class="title">비열 시뮬레이터</h1>
      <div class="subtitle">
        멘타트 연산을 위해 두 시료의 [물질]과 [질량]를 설정하십시오.<br />
        동일한 열에너지를 가했을 때의 온도 변화를 분석합니다.
      </div>
    </div>

    <div class="cards" id="cardsContainer"></div>

    <div class="message-box">
      <div class="terminal-header">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        MENTAT_LOG
      </div>
      <div class="main-message" id="mainMessage">> 자유 연습 모드 활성화</div>
      <div class="sub-message" id="subMessage">
        물질의 종류와 질량을 변경하며 시료의 온도 변화 속도를 비교 분석하십시오.
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
