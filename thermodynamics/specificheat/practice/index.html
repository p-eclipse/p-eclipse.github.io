<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>비열 연습 게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="menu-link" href="../">← 메뉴로 돌아가기</a>

      <div class="top-right">
        <div class="mode-badge">PRACTICE MODE</div>
      </div>
    </div>

    <div class="title">비열 연습 모드</div>

    <div class="subtitle">
      두 시료의 <strong>물질</strong>과 <strong>질량</strong>을 직접 선택해 보세요.
      <br />
      똑같이 가열해도 비열과 질량에 따라 온도 변화가 달라집니다.
    </div>

    <div class="cards" id="cardsContainer"></div>

    <div class="message-box">
      <div class="main-message" id="mainMessage">자유 연습</div>
      <div class="sub-message" id="subMessage">
        물질과 질량을 바꿔 가며 어떤 시료가 빨리 뜨거워지고 빨리 식는지 비교해 보세요.
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
