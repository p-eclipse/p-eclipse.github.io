<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비열의 제왕</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      /* 아라키스의 깊은 사막 밤과 모래폭풍 느낌의 배경 */
      background-color: #0c0906;
      background-image: 
        radial-gradient(circle at top center, rgba(168, 102, 50, 0.15) 0%, rgba(12, 9, 6, 1) 70%),
        radial-gradient(circle at bottom, rgba(0, 168, 255, 0.05) 0%, transparent 50%);
      color: #e8dcc4; /* 모래빛이 도는 흰색 */
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      text-align: center;
      position: relative;
      z-index: 10;
    }

    .title-box {
      margin-bottom: 56px;
      position: relative;
    }

    /* 듄 특유의 웅장하고 넓은 자간의 타이틀 */
    .title {
      margin: 0;
      font-size: clamp(2.8rem, 8vw, 4.5rem);
      font-weight: 800;
      letter-spacing: 0.15em;
      line-height: 1.2;
      text-transform: uppercase;
      /* 빛나는 모래와 향신료의 색상 */
      background: linear-gradient(135deg, #f7e6c4 0%, #c49a51 50%, #8a5a2b 100%);
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0px 4px 15px rgba(196, 154, 81, 0.3);
    }

    /* 타이틀 장식선 (스파이스 블루) */
    .title::after {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background: #00a8ff;
      margin: 24px auto 0;
      box-shadow: 0 0 12px rgba(0, 168, 255, 0.8);
      border-radius: 1px;
    }

    .subtitle {
      margin-top: 20px;
      font-size: clamp(0.9rem, 2vw, 1rem);
      color: #00a8ff; /* 이바드의 눈(Eyes of Ibad) 색상 */
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(0, 168, 255, 0.4);
    }

    .menu {
      display: grid;
      gap: 24px;
    }

    /* 모놀리스(거석) 느낌의 묵직한 버튼 */
    .menu-button {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 100%;
      padding: 24px 28px;
      text-decoration: none;
      color: #e8dcc4;
      background: rgba(20, 15, 10, 0.6);
      border: 1px solid rgba(196, 154, 81, 0.15);
      /* 가혹한 환경을 나타내는 날카로운 컷팅 */
      clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow: hidden;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }

    .menu-button::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: #c49a51;
      transition: width 0.3s ease, background 0.3s ease;
    }

    /* 모래바람이 스쳐지나가는 듯한 호버 이펙트 */
    .menu-button::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(196, 154, 81, 0.08), transparent);
      transform: skewX(-25deg);
      transition: none;
    }

    .menu-button:hover::after {
      left: 200%;
      transition: left 0.7s ease-in-out;
    }

    .menu-button:hover {
      transform: translateY(-2px);
      background: rgba(30, 22, 15, 0.9);
      border-color: rgba(196, 154, 81, 0.4);
    }

    .menu-button:active {
      transform: translateY(1px) scale(0.99);
    }

    .btn-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-left: 16px;
    }

    .menu-title {
      font-size: clamp(1.3rem, 4vw, 1.6rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: color 0.3s ease;
    }

    .menu-label {
      font-size: 0.9rem;
      font-weight: 300;
      color: #9a8c78;
      letter-spacing: -0.02em;
    }

    /* 1. 연습게임 (프레멘의 모래) */
    .btn-practice:hover::before { background: #e5c07b; box-shadow: 0 0 15px #e5c07b; width: 6px; }
    .btn-practice:hover .menu-title { color: #e5c07b; text-shadow: 0 0 10px rgba(229, 192, 123, 0.3); }

    /* 2. 타임어택 (스파이스의 각성) */
    .btn-timeattack:hover::before { background: #00a8ff; box-shadow: 0 0 15px #00a8ff; width: 6px; }
    .btn-timeattack:hover .menu-title { color: #00a8ff; text-shadow: 0 0 10px rgba(0, 168, 255, 0.4); }
    .btn-timeattack:hover { border-color: rgba(0, 168, 255, 0.3); }

    /* 3. 명예의 전당 (황제의 권좌) */
    .btn-leaderboard:hover::before { background: #c94c4c; box-shadow: 0 0 15px #c94c4c; width: 6px; }
    .btn-leaderboard:hover .menu-title { color: #e8a7a7; text-shadow: 0 0 10px rgba(201, 76, 76, 0.4); }
    .btn-leaderboard:hover { border-color: rgba(201, 76, 76, 0.3); }

    /* 하단 푸터 */
    .footer {
      margin-top: 56px;
      font-size: 0.75rem;
      color: rgba(154, 140, 120, 0.5);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .footer::before, .footer::after {
      content: '';
      display: block;
      width: 40px;
      height: 1px;
      background: rgba(196, 154, 81, 0.2);
    }

    @media (max-width: 480px) {
      .menu-button {
        padding: 20px;
      }
      .btn-content {
        padding-left: 8px;
      }
      .title {
        letter-spacing: 0.1em;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="title-box">
      <h1 class="title">비열의 제왕</h1>
      <div class="subtitle">Select Your Path</div>
    </div>

    <section class="menu">
      <a class="menu-button btn-practice" href="./practice/">
        <div class="btn-content">
          <span class="menu-title">듄의 법칙 (연습)</span>
          <span class="menu-label">모래의 흐름을 읽고 생존의 기초를 다지십시오.</span>
        </div>
      </a>

      <a class="menu-button btn-timeattack" href="./timeattack/">
        <div class="btn-content">
          <span class="menu-title">스파이스 러시 (타임어택)</span>
          <span class="menu-label">시간은 스파이스와 같습니다. 가장 빠른 자가 지배합니다.</span>
        </div>
      </a>

      <a class="menu-button btn-leaderboard" href="./timeattack/leaderboard.html">
        <div class="btn-content">
          <span class="menu-title">코리노의 기록 (명예의 전당)</span>
          <span class="menu-label">우주에 이름을 새긴 전설적인 퀴사츠 해더락들.</span>
        </div>
      </a>
    </section>

    <div class="footer">The Lord of Specific Heat</div>
  </main>
</body>
</html>
