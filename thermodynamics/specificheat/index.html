<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비열의 제왕</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top, #2b3f73 0%, #15213d 45%, #0a1020 100%);
      color: #ffffff;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      text-align: center;
    }

    .title-box {
      margin-bottom: 36px;
    }

    .title {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.4rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1.1;
      text-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .subtitle {
      margin-top: 12px;
      font-size: clamp(0.95rem, 2.3vw, 1.15rem);
      color: rgba(255, 255, 255, 0.82);
    }

    .menu {
      display: grid;
      gap: 18px;
    }

    .menu-button {
      display: block;
      width: 100%;
      padding: 22px 20px;
      border-radius: 22px;
      text-decoration: none;
      color: #ffffff;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 800;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
    }

    .menu-button:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.18);
      box-shadow:
        0 16px 36px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .menu-button:active {
      transform: translateY(-1px) scale(0.99);
    }

    .menu-label {
      display: block;
      font-size: 0.95rem;
      font-weight: 500;
      opacity: 0.82;
      margin-top: 6px;
    }

    .footer {
      margin-top: 28px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
    }

    @media (max-width: 480px) {
      .menu-button {
        padding: 18px 16px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="title-box">
      <h1 class="title">비열의 제왕</h1>
      <div class="subtitle">모드를 선택하세요</div>
    </div>

    <section class="menu">
      <a class="menu-button" href="./practice/index.html">
        🎯 연습게임
        <span class="menu-label">자유롭게 연습하기</span>
      </a>

      <a class="menu-button" href="./timeattack/index.html">
        ⏱ 타임어택
        <span class="menu-label">빠르게 클리어에 도전</span>
      </a>

      <a class="menu-button" href="./timeattack/leaderboard.html">
        🏆 명예의전당
        <span class="menu-label">기록 확인하기</span>
      </a>
    </section>

    <div class="footer">The King of Specific Heat</div>
  </main>
</body>
</html>
