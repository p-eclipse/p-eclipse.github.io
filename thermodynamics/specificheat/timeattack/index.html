<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비열 타임어택</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="menu-link" href="../">← 메뉴로 돌아가기</a>

      <div class="top-right">
        <div class="player-badge" id="playerBadge">플레이어 미설정</div>
        <button class="rank-btn" id="leaderboardBtn" type="button">순위표</button>
        <div class="level-badge" id="levelBadge">LEVEL 1 / 10</div>
      </div>
    </div>

    <div class="time-row">
      <div class="top-time">
        TOTAL TIME <span id="totalTimeText">0.0s</span>
      </div>

      <div class="bottom-panel">
        <div class="success-box">
          <div class="success-label">SUCCESS</div>
          <div class="success-time" id="successTimeText">0.0s</div>
        </div>

        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="goal-text">목표: 2.0s</div>
      </div>
    </div>

    <div class="cards" id="cardsContainer"></div>

    <div class="message-box">
      <div class="main-message" id="mainMessage">시작!</div>
      <div class="sub-message" id="subMessage">
        모든 물질의 온도를 <strong>70℃~90℃</strong> 범위에 맞춘 채
        <strong>2.0초</strong> 유지하세요.
        <br />
        똑같이 가열해도 비열과 질량에 따라 온도 변화가 달라집니다.
      </div>

      <div class="action-row">
        <button class="secondary-btn gray" id="restartBtn" type="button">
          현재 레벨 다시 시작
        </button>
        <button class="secondary-btn gray hidden" id="fullResetBtn" type="button">
          처음부터 다시
        </button>
      </div>
    </div>
  </div>

  <div class="overlay" id="clearOverlay">
    <div class="overlay-card">
      <div class="overlay-badge" id="overlayBadge">LEVEL CLEAR</div>

      <div class="overlay-title" id="overlayTitle">레벨 클리어!</div>

      <div class="overlay-desc" id="overlayDesc">
        모든 물질을 목표 온도 범위에 안정적으로 유지했다!
      </div>

      <div class="overlay-stats">
        <div class="overlay-stat">
          <div class="overlay-stat-label">클리어한 레벨</div>
          <div class="overlay-stat-value" id="overlayLevelValue">1 / 10</div>
        </div>

        <div class="overlay-stat">
          <div class="overlay-stat-label">누적 기록</div>
          <div class="overlay-stat-value" id="overlayTimeValue">0.0s</div>
        </div>
      </div>

      <div class="overlay-actions">
        <button class="overlay-btn primary" id="overlayNextBtn" type="button">
          다음 레벨
        </button>
        <button class="overlay-btn secondary hidden" id="overlayLeaderboardBtn" type="button">
          순위표 보기
        </button>
        <button class="overlay-btn secondary hidden" id="overlayResetBtn" type="button">
          처음부터 다시
        </button>
      </div>
    </div>
  </div>

  <div class="overlay profile-overlay show" id="profileOverlay">
    <div class="overlay-card profile-card">
      <div class="overlay-badge">TIME ATTACK SETUP</div>
      <div class="overlay-title">반과 닉네임 설정</div>
      <div class="overlay-desc">반을 선택해주십시오. 기록은 선택한 반 순위표로 저장됩니다.</div>

      <div class="profile-grid">
        <div class="profile-field">
          <label for="classSelect">반 선택</label>
          <select id="classSelect">
            <option value="">선택</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </div>
      </div>

      <div class="nickname-preview" id="nicknamePreview">이름을 생성해주십시오.</div>
      <div class="profile-error" id="profileError"></div>

      <div class="overlay-actions profile-actions">
        <button class="overlay-btn secondary" id="randomNicknameBtn" type="button">이름 다시짓기</button>
        <button class="overlay-btn primary" id="startGameBtn" type="button">타임어택 시작</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
