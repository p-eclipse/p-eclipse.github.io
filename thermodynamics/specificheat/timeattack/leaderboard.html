<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>명예의 전당</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      background: #eef2f7;
      color: #1e293b;
    }

    button,
    select,
    a {
      font: inherit;
    }

    .wrap {
      width: min(980px, calc(100% - 28px));
      margin: 32px auto 56px;
    }

    .topbar {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #dbe3ee;
      border-radius: 20px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      margin-bottom: 18px;
    }

    .menu-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: #54709a;
      font-size: 14px;
      font-weight: 800;
      padding: 10px 14px;
      border-radius: 999px;
      background: #f1f5f9;
      transition: filter 0.15s ease, transform 0.08s ease;
    }

    .menu-link:hover {
      filter: brightness(0.98);
    }

    .menu-link:active {
      transform: translateY(1px);
    }

    .topbar-right {
      font-size: 14px;
      font-weight: 800;
      color: #62748e;
      background: #f1f4f8;
      padding: 10px 14px;
      border-radius: 999px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #dbe3ee;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      color: #1d4ed8;
    }

    .desc {
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 22px;
    }

    select {
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 12px 14px;
      background: white;
      min-width: 140px;
      color: #0f172a;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: filter 0.15s ease, transform 0.08s ease;
    }

    button:hover {
      filter: brightness(0.98);
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 16px;
      background: white;
      min-width: 640px;
    }

    thead th {
      background: #eff6ff;
      color: #1d4ed8;
      text-align: left;
      font-size: 14px;
      padding: 14px 16px;
      white-space: nowrap;
    }

    tbody td {
      padding: 14px 16px;
      border-top: 1px solid #e2e8f0;
      font-size: 15px;
      white-space: nowrap;
    }

    tbody tr:first-child td {
      border-top: none;
    }

    .rank {
      font-weight: 900;
      width: 90px;
    }

    .class-cell {
      font-weight: 800;
      color: #334155;
      width: 90px;
    }

    .top3 {
      font-weight: 900;
      color: #1d4ed8;
    }

    .empty {
      padding: 28px 16px;
      text-align: center;
      color: #64748b;
    }

    .foot {
      margin-top: 14px;
      color: #64748b;
      font-size: 14px;
    }

    @media (max-width: 760px) {
      .wrap {
        width: min(100%, calc(100% - 20px));
        margin: 20px auto 32px;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .topbar-right {
        text-align: center;
      }

      .panel {
        padding: 18px;
      }

      h1 {
        font-size: 26px;
      }

      thead th,
      tbody td {
        padding: 12px 10px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="menu-link" href="../">← 메뉴로 돌아가기</a>
      <div class="topbar-right">비열의 제왕 · 명예의 전당</div>
    </div>

    <div class="panel">
      <h1>명예의 전당</h1>
      <div class="desc">
        반별 기록과 전체 순위를 확인해보세요!
      </div>

      <div class="toolbar">
        <select id="classSelect"></select>
        <button class="primary" id="refreshBtn" type="button">새로고침</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>순위</th>
              <th>반</th>
              <th>닉네임</th>
              <th>기록</th>
              <th>시간</th>
            </tr>
          </thead>
          <tbody id="rankingBody">
            <tr>
              <td class="empty" colspan="5">데이터를 불러오는 중.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="foot" id="footText"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, query, orderByChild, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyC8n2DKZU3-HRrVx8k82ocICMOs26BnR_M",
      authDomain: "lord-of-specific-heat.firebaseapp.com",
      databaseURL: "https://lord-of-specific-heat-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "lord-of-specific-heat",
      storageBucket: "lord-of-specific-heat.firebasestorage.app",
      messagingSenderId: "1071681493906",
      appId: "1:1071681493906:web:5c47f588f801cbc999bf4b"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    const nicknameAList = [
      "싸늘한", "신나는", "두려운", "악몽의",
      "정복자", "귀살대", "초롱초롱", "흥얼거리는",
      "산뜻한", "관대한", "풋풋한", "졸린눈의",
      "종언의", "천마", "불타는", "레전드"
    ];
    
    const nicknameBList = [
      "아인슈타인", "파인만", "갈릴레이", "뉴턴",
      "패러데이", "켈빈", "라부아지에", "멘델",
      "퀴리", "지석영", "파스퇴르", "다윈",
      "호킹", "노이만", "코페르니쿠스", "튜링"
    ];
    
    const MAX_CLASS = 8;
    
    const classSelect = document.getElementById("classSelect");
    const refreshBtn = document.getElementById("refreshBtn");
    const rankingBody = document.getElementById("rankingBody");
    const footText = document.getElementById("footText");
    
    function getQueryClass() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("class");
    
      if (raw === "all") return "all";
    
      const value = Number(raw);
      if (Number.isInteger(value) && value >= 1 && value <= MAX_CLASS) {
        return String(value).padStart(2, "0");
      }
    
      return "all";
    }
    
    function fillClasses() {
      classSelect.innerHTML = "";
    
      const allOption = document.createElement("option");
      allOption.value = "all";
      allOption.textContent = "전체 순위";
      classSelect.appendChild(allOption);
    
      for (let i = 1; i <= MAX_CLASS; i += 1) {
        const option = document.createElement("option");
        option.value = String(i).padStart(2, "0");
        option.textContent = `${i}반`;
        classSelect.appendChild(option);
      }
    
      classSelect.value = getQueryClass();
    }
    
    function decodeNameCode(nameCode) {
      if (!Number.isInteger(nameCode) || nameCode < 0 || nameCode > 255) {
        return "알 수 없는 플레이어";
      }
    
      const adjIndex = (nameCode >> 4) & 0x0F;
      const nameIndex = nameCode & 0x0F;
    
      const partA = nicknameAList[adjIndex];
      const partB = nicknameBList[nameIndex];
    
      if (partA === undefined || partB === undefined) {
        return "알 수 없는 플레이어";
      }
    
      return `${partA} ${partB}`;
    }
    
    function parseWho(whoValue) {
      if (!Number.isInteger(whoValue) || whoValue < 0 || whoValue > 65535) {
        return {
          classNum: 0,
          classLabel: "-",
          nameCode: -1,
          fullName: "알 수 없는 플레이어"
        };
      }
    
      const classNum = (whoValue >> 8) & 0xFF;
      const nameCode = whoValue & 0xFF;
    
      return {
        classNum,
        classLabel: classNum === 0 ? "인식실패" : `${classNum}반`,
        nameCode,
        fullName: decodeNameCode(nameCode)
      };
    }
    
    function formatTime(timeValue) {
      if (typeof timeValue !== "number" || !Number.isFinite(timeValue)) return "-";
      return `${(timeValue / 100).toFixed(2)}s`;
    }
    
    function renderRows(items, labelText) {
      rankingBody.innerHTML = "";
    
      if (!items.length) {
        rankingBody.innerHTML = '<tr><td class="empty" colspan="5">아직 저장된 기록이 없습니다.</td></tr>';
        footText.textContent = labelText;
        return;
      }
    
      items.forEach((item, index) => {
        const tr = document.createElement("tr");
        const rank = index + 1;
    
        tr.innerHTML = `
          <td class="rank ${rank <= 3 ? "top3" : ""}">${rank}위</td>
          <td class="class-cell">${item.classLabel}</td>
          <td>${item.fullName}</td>
          <td>${item.timeText}</td>
          <td>${item.orderText}</td>
        `;
    
        rankingBody.appendChild(tr);
      });
    
      footText.textContent = labelText;
    }
    
    function normalizeRows(snapshot) {
      const items = [];
    
      snapshot.forEach((childSnap) => {
        const data = childSnap.val() || {};
        const parsed = parseWho(data.who);
    
        if (typeof data.time !== "number") return;
    
        items.push({
          classNum: parsed.classNum,
          classLabel: parsed.classLabel,
          fullName: parsed.fullName,
          timeValue: data.time,
          timeText: formatTime(data.time),
          orderText: childSnap.key
        });
      });
    
      items.sort((a, b) => a.timeValue - b.timeValue);
      return items;
    }
    
    async function loadAllClasses() {
      const rankingQuery = query(ref(db, "leaderboard"), orderByChild("time"));
      const snapshot = await get(rankingQuery);
    
      if (!snapshot.exists()) {
        renderRows([], "전체 기록 0개");
        return;
      }
    
      const items = normalizeRows(snapshot);
      renderRows(items, `전체 기록 ${items.length}개`);
    }
    
    async function loadSingleClass(classHex) {
      const rankingQuery = query(ref(db, "leaderboard"), orderByChild("time"));
      const snapshot = await get(rankingQuery);
    
      const classNum = parseInt(classHex, 10);
    
      if (!snapshot.exists()) {
        renderRows([], `${classNum}반 기록 0개`);
        return;
      }
    
      const items = normalizeRows(snapshot).filter((item) => item.classNum === classNum);
      renderRows(items, `${classNum}반 기록 ${items.length}개`);
    }
    
    async function renderRanking() {
      rankingBody.innerHTML = '<tr><td class="empty" colspan="5">데이터를 불러오는 중.</td></tr>';
    
      try {
        const selected = classSelect.value;
    
        if (selected === "all") {
          await loadAllClasses();
        } else {
          await loadSingleClass(selected);
        }
      } catch (error) {
        console.error("순위표 로드 실패:", error);
        rankingBody.innerHTML = '<tr><td class="empty" colspan="5" style="color:#dc2626;">데이터를 불러오는데 실패했습니다.</td></tr>';
        footText.textContent = "네트워크 또는 Firebase 설정을 확인하십시오.";
      }
    }
    
    classSelect.addEventListener("change", () => {
      const selected = classSelect.value;
      const nextUrl = new URL(window.location.href);
      nextUrl.searchParams.set("class", selected);
      window.history.replaceState({}, "", nextUrl);
      renderRanking();
    });
    
    refreshBtn.addEventListener("click", renderRanking);
    
    fillClasses();
    renderRanking();
  </script>
</body>
</html>
