<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>물질의 상태 변화 입자 모형 시뮬레이션</title>
  <style>
    :root {
      --bg: #101216;
      --panel: #1b1f27;
      --panel2: #242a35;
      --text: #111827;
      --muted: #6b7280;
      --accent: #ff6a00;
      --cool: #4aa3ff;
      --heat: #ff6a00;
      --line: #384252;
      --good: #34c759;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f7f7f8;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .app {
      width: 100vw;
      height: 100vh;
      margin: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      grid-template-rows: minmax(0, 1fr);
      gap: 12px;
      padding: 14px;
      background: #f7f7f8;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      overflow: hidden;
      min-height: 0;
    }

    .mainGrid {
      grid-column: 1;
      grid-row: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
    }

    .bottomGrid {
      grid-column: 2;
      grid-row: 1;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto;
      align-content: start;
      gap: 12px;
      min-width: 0;
      min-height: 0;
    }

    .sim-card,
    .graphCard {
      position: relative;
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      min-height: 54px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
    }

    .title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #111827;
    }

    .sub {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      color: #111827;
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
    }

    #simCanvas,
    #graphCanvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #ffffff;
    }

    .controls {
      height: fit-content;
      max-height: calc(100vh - 28px);
      overflow: auto;
      padding: 12px 14px;
      display: grid;
      gap: 14px;
    }

    .controlHeaderBlock {
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    .controlEyebrow,
    .controlTitle {
      font-size: 12px;
      font-weight: 800;
      color: #6b7280;
      letter-spacing: 0.02em;
    }

    .controlEyebrow { margin-bottom: 8px; }

    .tempBox {
      display: grid;
      grid-template-columns: 1fr;
      align-items: end;
      gap: 4px;
      margin-bottom: 8px;
    }

    .tempLabel {
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
    }

    .tempValue {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .stateText {
      min-height: 0;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.45;
      color: #374151;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px;
    }

    .controlGroup {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #f9fafb;
    }

    .primaryGroup {
      background: #ffffff;
      border-color: #d1d5db;
    }

    .compactGroup { gap: 6px; }

    .buttons,
    .selectRow {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 10px 10px;
      font-size: 14px;
      font-weight: 900;
      color: white;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
      transition: transform 0.08s, filter 0.15s, opacity 0.15s;
    }

    button:active { transform: translateY(1px) scale(0.99); }
    button.off { opacity: 0.42; filter: grayscale(0.35); }

    .heat { background: linear-gradient(180deg, #ff8a1f, #e24e00); }
    .cool { background: linear-gradient(180deg, #62b8ff, #1667d8); }
    .reset { background: linear-gradient(180deg, #687386, #3b4453); width: 100%; font-size: 13px; padding: 9px; }

    .selectRow { margin: 10px 0 8px; }

    .selectRow button {
      font-size: 12px;
      padding: 8px 8px;
      background: #2a3140;
      box-shadow: none;
    }

    .selectRow button.active {
      outline: 2px solid var(--accent);
      background: #3a2d22;
    }

    .secondaryReset {
      background: linear-gradient(180deg, #f3f4f6, #e5e7eb);
      color: #111827;
      box-shadow: none;
    }

    .barWrap {
      height: 9px;
      background: #111722;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--cool), white, var(--heat));
      transition: width 0.08s linear;
    }

    .phaseBox { display: none !important; }

    .graphToggleWrap {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 800;
      color: #374151;
      white-space: nowrap;
      user-select: none;
    }

    .appleSwitch {
      position: relative;
      width: 52px;
      height: 30px;
      display: inline-block;
      flex: 0 0 auto;
    }

    .appleSwitch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .switchSlider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #d1d5db;
      border-radius: 999px;
      transition: 0.22s ease;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.18);
    }

    .switchSlider::before {
      content: "";
      position: absolute;
      width: 26px;
      height: 26px;
      left: 2px;
      top: 2px;
      background: white;
      border-radius: 50%;
      transition: 0.22s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.28);
    }

    .appleSwitch input:checked + .switchSlider {
      background: #34c759;
    }

    .appleSwitch input:checked + .switchSlider::before {
      transform: translateX(22px);
    }

    @media (max-width: 1100px) {
      body { overflow: auto; }

      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .mainGrid {
        grid-column: 1;
        grid-row: 1;
        grid-template-columns: 1fr;
      }

      .bottomGrid {
        grid-column: 1;
        grid-row: 2;
      }

      .sim-card,
      .graphCard {
        height: 380px;
      }

      .controls { max-height: none; }
      .buttons { grid-template-columns: 1fr 1fr; }
      .selectRow { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="mainGrid">
      <section class="card sim-card">
        <div class="header">
          <div>
            <div class="title">물질의 상태 변화 모형</div>
            <div class="sub">물의 입자 운동</div>
          </div>
          <div class="badge" id="modeBadge">정지</div>
        </div>
        <canvas id="simCanvas"></canvas>
      </section>

      <section class="card graphCard">
        <div class="header">
          <div>
            <div class="title" id="graphTitle">온도-시간 그래프</div>
            <div class="sub" id="graphSub">0℃와 100℃에서 온도 정체 구간이 나타납니다.</div>
          </div>
          <div class="graphToggleWrap">
            <span id="graphModeText">온도</span>
            <label class="appleSwitch" aria-label="그래프 종류 전환">
              <input type="checkbox" id="graphToggle" />
              <span class="switchSlider"></span>
            </label>
          </div>
        </div>
        <canvas id="graphCanvas"></canvas>
      </section>
    </section>

    <section class="bottomGrid">
      <section class="card controls">
        <div class="controlHeaderBlock">
          <div class="controlEyebrow">현재 상태</div>
          <div class="tempBox">
            <div>
              <div class="tempLabel">온도</div>
              <div class="tempValue"><span id="tempText">-20.0</span>℃</div>
            </div>
          </div>
          <div class="stateText" id="stateText">고체: 입자가 제자리 주변에서 진동합니다. 온도가 올라갈수록 진동이 빨라집니다.</div>
        </div>

        <div class="controlGroup primaryGroup">
          <div class="controlTitle">실험 조작</div>
          <div class="buttons">
            <button class="heat" id="heatBtn">가열</button>
            <button class="cool" id="coolBtn">냉각</button>
          </div>
          <button class="reset" id="pauseBtn">정지</button>
        </div>

        <div class="controlGroup">
          <div class="controlTitle">초기 상태 선택</div>
          <div class="selectRow">
            <button id="solidStart">고체 시작</button>
            <button id="liquidStart">액체 시작</button>
            <button id="gasStart">기체 시작</button>
          </div>
          <button class="reset secondaryReset" id="resetBtn">현재 상태로 다시 배열</button>
        </div>

        <div class="controlGroup compactGroup">
          <div class="controlTitle">온도 범위</div>
          <div class="barWrap"><div class="bar" id="tempBar"></div></div>
        </div>
      </section>

      <section class="card phaseBox">
        <div class="phaseItem"><b>융해/응고</b><div class="phaseMeter"><div class="phaseFill" id="meltFill"></div></div></div>
        <div class="phaseItem"><b>기화/응결</b><div class="phaseMeter"><div class="phaseFill" id="boilFill"></div></div></div>
      </section>
    </section>
  </main>

  <script>
    const simCanvas = document.getElementById('simCanvas');
    const gCanvas = document.getElementById('graphCanvas');
    const ctx = simCanvas.getContext('2d');
    const gtx = gCanvas.getContext('2d');

    const tempText = document.getElementById('tempText');
    const stateText = document.getElementById('stateText');
    const modeBadge = document.getElementById('modeBadge');
    const tempBar = document.getElementById('tempBar');
    const meltFill = document.getElementById('meltFill');
    const boilFill = document.getElementById('boilFill');

    const heatBtn = document.getElementById('heatBtn');
    const coolBtn = document.getElementById('coolBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const solidStart = document.getElementById('solidStart');
    const liquidStart = document.getElementById('liquidStart');
    const gasStart = document.getElementById('gasStart');

    const graphToggle = document.getElementById('graphToggle');
    const graphModeText = document.getElementById('graphModeText');
    const graphTitleEl = document.getElementById('graphTitle');
    const graphSubEl = document.getElementById('graphSub');

    const N = 72;
    const MOLECULE_COLLISION_RADIUS = 14;
    const MOLECULE_GAP = 2;
    const ICE_EDGE = 42;
    const WATER_HALF_ANGLE = Math.PI / 3;
    const WATER_BOND = 8.6;
    const WATER_O_RADIUS = 7.6;
    const WATER_H_RADIUS = 4.4;
    const MOLECULE_MASS = 1.0;
    const MOLECULE_INERTIA = 260;
    const MIN_T = -30;
    const MAX_T = 130;
    const MELT_T = 0;
    const BOIL_T = 100;
    const HEAT_RATE = 8.5;
    const COOL_RATE = 8.5;
    const MELT_LATENT = 42;
    const BOIL_LATENT = 60;
    const GRAVITY_BELOW_BOILING = 130;
    const COOLING_GRAVITY_BOOST = 130;
    const THERMAL_ENERGY_SAMPLE_RATIO = 0.80;
    const GAS_RESTITUTION_MIN = 0.52;
    const GAS_RESTITUTION_BASE = 1.00;
    const GAS_RESTITUTION_MAX = 1.035;

    let W = 900, H = 620, graphW = 400, graphH = 260;
    let molecules = [];
    let temp = -20;
    let direction = 0;
    let phase = 'solid';
    let meltProgress = 0;
    let boilProgress = 0;
    let time = 0;
    let history = [];
    let last = performance.now();
    let freezingTargetsLocked = false;
    let gasRestitution = GAS_RESTITUTION_BASE;
    let graphMode = 'temperature';

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const r = simCanvas.getBoundingClientRect();
      W = Math.max(300, r.width);
      H = Math.max(300, r.height);
      simCanvas.width = W * dpr;
      simCanvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const gr = gCanvas.getBoundingClientRect();
      graphW = Math.max(220, gr.width);
      graphH = Math.max(180, gr.height);
      gCanvas.width = graphW * dpr;
      gCanvas.height = graphH * dpr;
      gtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      assignTargets();
    }

    function rand(a, b) { return a + Math.random() * (b - a); }
    function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function smoothstep(x) { x = clamp(x, 0, 1); return x * x * (3 - 2 * x); }

    function containerBounds() {
      return { x: W * 0.055, y: H * 0.06, w: W * 0.89, h: H * 0.82, floor: H * 0.88 };
    }

    function makeMolecules(startPhase = 'solid') {
      molecules = [];
      for (let i = 0; i < N; i++) {
        molecules.push({
          x: 0, y: 0, vx: 0, vy: 0,
          tx: 0, ty: 0,
          lx: 0, ly: 0,
          angle: rand(0, Math.PI * 2),
          lockedAngle: rand(0, Math.PI * 2),
          renderJitterX: 0,
          renderJitterY: 0,
          w: rand(-2.0, 2.0),
          av: rand(-1, 1),
          seed: rand(0, 1000),
          bound: [],
          radius: 10
        });
      }
      setState(startPhase, true);
    }

    function averageEnergyValue() {
      return particleInternalEnergyValue();
    }

    function particleInternalEnergyValue() {
      if (!molecules.length) return 0;

      let kinetic = 0;
      molecules.forEach(m => {
        const v2 = m.vx * m.vx + m.vy * m.vy;
        const w2 = (m.w || 0) * (m.w || 0);
        kinetic += 0.5 * MOLECULE_MASS * v2 + 0.5 * MOLECULE_INERTIA * w2;
      });

      const avgKinetic = kinetic / molecules.length;
      const tempContribution = clamp((temp - MIN_T) / (MAX_T - MIN_T), 0, 1) * 55;
      const latentContribution = meltProgress * 28 + boilProgress * 42;
      const motionContribution = clamp(avgKinetic / 1200, 0, 60);

      return clamp(tempContribution + latentContribution + motionContribution, 0, 130);
    }

    function setStart(which) {
      direction = 0;
      if (which === 'solid') { temp = -20; meltProgress = 0; boilProgress = 0; }
      if (which === 'liquid') { temp = 50; meltProgress = 1; boilProgress = 0; }
      if (which === 'gas') { temp = 120; meltProgress = 1; boilProgress = 1; gasRestitution = GAS_RESTITUTION_BASE; }
      setState(which, true);
      time = 0;
      history = [{ t: 0, temp, energy: averageEnergyValue() }];
      updateUI();
    }

    function setState(s, instant = false) {
      phase = s;
      if (s === 'solid') {
        if (instant) assignTargets();
        else assignLocalCrystalTargets();
      } else {
        assignTargets();
      }

      const b = containerBounds();
      molecules.forEach((m) => {
        if (s === 'solid') {
          m.x = instant ? m.tx : m.x;
          m.y = instant ? m.ty : m.y;
          m.vx = 0; m.vy = 0; m.w = 0;
        } else if (s === 'liquid') {
          if (instant) {
            m.x = rand(b.x + 30, b.x + b.w - 30);
            m.y = rand(b.floor - H * 0.28, b.floor - 35);
          }
          m.vx = rand(-25, 25); m.vy = rand(-10, 10); m.w = rand(-2.5, 2.5);
        } else {
          if (instant) {
            m.x = rand(b.x + 30, b.x + b.w - 30);
            m.y = rand(b.y + 35, b.floor - 40);
          }
          const a = rand(0, Math.PI * 2);
          const sp = rand(45, 95);
          m.vx = Math.cos(a) * sp; m.vy = Math.sin(a) * sp; m.w = rand(-5.0, 5.0);
        }
        m.lx = m.x; m.ly = m.y;
      });
    }

    function makeHoneycombVertices(cx, cy, edge, ringRange, bounds = null) {
      const verts = [];
      const seen = new Set();
      for (let r = -ringRange; r <= ringRange; r++) {
        for (let q = -ringRange; q <= ringRange; q++) {
          const centerX = cx + edge * 1.5 * q;
          const centerY = cy + edge * Math.sqrt(3) * (r + q / 2);
          for (let k = 0; k < 6; k++) {
            const a = Math.PI / 6 + k * Math.PI / 3;
            const x = centerX + edge * Math.cos(a);
            const y = centerY + edge * Math.sin(a);
            if (bounds && (x < bounds.x + 40 || x > bounds.x + bounds.w - 40 || y < bounds.y + 40 || y > bounds.floor - 40)) continue;
            const key = `${Math.round(x)},${Math.round(y)}`;
            if (seen.has(key)) continue;
            seen.add(key);
            verts.push({ x, y });
          }
        }
      }
      verts.sort((a, b) => (a.x - cx) ** 2 + (a.y - cy) ** 2 - ((b.x - cx) ** 2 + (b.y - cy) ** 2));
      return verts;
    }

    function assignTargets() {
      if (!molecules.length) return;
      const b = containerBounds();
      const cx = b.x + b.w / 2;
      const cy = b.floor - H * 0.40;
      const verts = makeHoneycombVertices(cx, cy, ICE_EDGE, 6, b).slice(0, N);

      molecules.forEach((m, i) => {
        const v = verts[i] || verts[verts.length - 1];
        m.tx = v.x;
        m.ty = v.y;
        m.localGX = i;
        m.localGY = 0;
      });

      orientCrystalMolecules();
    }

    function angleDiff(a, b) {
      let d = Math.abs(a - b) % (Math.PI * 2);
      return Math.min(d, Math.PI * 2 - d);
    }

    function meanAngle(a, b) {
      return Math.atan2(Math.sin(a) + Math.sin(b), Math.cos(a) + Math.cos(b));
    }

    function orientCrystalMolecules() {
      molecules.forEach((m, idx) => {
        m.crystalRole = idx % 2 === 0 ? 'donor' : 'acceptor';
      });

      molecules.forEach((m) => {
        const near = molecules
          .filter(n => n !== m)
          .map(n => {
            const dx = n.tx - m.tx;
            const dy = n.ty - m.ty;
            return { n, d: Math.hypot(dx, dy), a: Math.atan2(dy, dx) };
          })
          .filter(x => x.d < ICE_EDGE * 1.35)
          .sort((a, b) => a.d - b.d);

        if (near.length === 0) {
          m.crystalAngle = 0;
          m.hBondTargets = [];
          return;
        }

        let bestPair = null;
        let bestScore = Infinity;
        for (let i = 0; i < near.length; i++) {
          for (let j = i + 1; j < near.length; j++) {
            const diff = angleDiff(near[i].a, near[j].a);
            const score = Math.abs(diff - 2 * WATER_HALF_ANGLE) + 0.012 * (near[i].d + near[j].d);
            if (score < bestScore) {
              bestScore = score;
              bestPair = [near[i], near[j]];
            }
          }
        }

        if (!bestPair) bestPair = [near[0]];

        if (m.crystalRole === 'donor' && bestPair.length >= 2) {
          const a1 = bestPair[0].a;
          const a2 = bestPair[1].a;
          m.crystalAngle = meanAngle(a1, a2);
          m.hBondTargets = [bestPair[0].n, bestPair[1].n];
        } else if (m.crystalRole === 'acceptor' && bestPair.length >= 2) {
          const a1 = bestPair[0].a + Math.PI;
          const a2 = bestPair[1].a + Math.PI;
          m.crystalAngle = meanAngle(a1, a2);
          m.hBondTargets = [];
        } else {
          const a = bestPair[0].a;
          m.crystalAngle = m.crystalRole === 'donor' ? a : a + Math.PI;
          m.hBondTargets = m.crystalRole === 'donor' ? [bestPair[0].n] : [];
        }
      });
    }

    function assignLocalCrystalTargets() {
      if (!molecules.length) return;

      const b = containerBounds();
      const cx = molecules.reduce((sum, m) => sum + m.x, 0) / molecules.length;
      const cy = molecules.reduce((sum, m) => sum + m.y, 0) / molecules.length;
      const candidates = makeHoneycombVertices(cx, cy, ICE_EDGE, 7, null);
      const used = new Set();
      const ordered = [...molecules].sort((a, b) => {
        const da = (a.x - cx) * (a.x - cx) + (a.y - cy) * (a.y - cy);
        const db = (b.x - cx) * (b.x - cx) + (b.y - cy) * (b.y - cy);
        return da - db;
      });

      ordered.forEach((m) => {
        let bestIndex = -1;
        let bestScore = Infinity;
        for (let i = 0; i < candidates.length; i++) {
          if (used.has(i)) continue;
          const c = candidates[i];
          const tx = clamp(c.x, b.x + 42, b.x + b.w - 42);
          const ty = clamp(c.y, b.y + 42, b.floor - 42);
          const dMol = (tx - m.x) * (tx - m.x) + (ty - m.y) * (ty - m.y);
          const dCenter = ((tx - cx) * (tx - cx) + (ty - cy) * (ty - cy)) * 0.04;
          const score = dMol + dCenter;
          if (score < bestScore) {
            bestScore = score;
            bestIndex = i;
          }
        }
        if (bestIndex < 0) return;
        used.add(bestIndex);
        const c = candidates[bestIndex];
        m.tx = clamp(c.x, b.x + 42, b.x + b.w - 42);
        m.ty = clamp(c.y, b.y + 42, b.floor - 42);
      });

      orientCrystalMolecules();
    }

    function phaseName() {
      if (boilProgress > 0 && boilProgress < 1) return direction > 0 ? '기화 중' : '응결 중';
      if (meltProgress > 0 && meltProgress < 1) return direction > 0 ? '융해 중' : '응고 중';
      if (phase === 'solid') return '고체';
      if (phase === 'liquid') return '액체';
      return '기체';
    }

    function updateThermal(dt) {
      if (direction === 0) return;
      const rate = direction > 0 ? HEAT_RATE : COOL_RATE;
      const tempBefore = temp;

      if (direction > 0) {
        freezingTargetsLocked = false;
        if (phase === 'solid' && temp < MELT_T) temp = Math.min(MELT_T, temp + rate * dt);
        else if ((phase === 'solid' || phase === 'liquid') && temp === MELT_T && meltProgress < 1) {
          meltProgress = Math.min(1, meltProgress + dt * rate / MELT_LATENT);
          if (meltProgress >= 1) setState('liquid');
        }
        else if (phase === 'liquid' && temp < BOIL_T) temp = Math.min(BOIL_T, temp + rate * dt);
        else if ((phase === 'liquid' || phase === 'gas') && temp === BOIL_T && boilProgress < 1) {
          boilProgress = Math.min(1, boilProgress + dt * rate / BOIL_LATENT);
          applyVaporizationTranslationalEnergy(dt);
          if (boilProgress >= 1) setState('gas');
        }
        else if (phase === 'gas' && temp < MAX_T) temp = Math.min(MAX_T, temp + rate * dt);
      } else {
        if (phase === 'gas' && temp > BOIL_T) temp = Math.max(BOIL_T, temp - rate * dt);
        else if ((phase === 'gas' || phase === 'liquid') && temp === BOIL_T && boilProgress > 0) {
          boilProgress = Math.max(0, boilProgress - dt * rate / BOIL_LATENT);
          if (boilProgress <= 0) setState('liquid');
        }
        else if (phase === 'liquid' && temp > MELT_T) temp = Math.max(MELT_T, temp - rate * dt);
        else if ((phase === 'liquid' || phase === 'solid') && temp === MELT_T && meltProgress > 0) {
          if (!freezingTargetsLocked) {
            assignLocalCrystalTargets();
            freezingTargetsLocked = true;
          }
          meltProgress = Math.max(0, meltProgress - dt * rate / MELT_LATENT);
          if (meltProgress <= 0) {
            meltProgress = 0;
            phase = 'solid';
            molecules.forEach(m => {
              m.vx *= 0.15;
              m.vy *= 0.15;
            });
          }
        }
        else if (phase === 'solid' && temp > MIN_T) temp = Math.max(MIN_T, temp - rate * dt);
      }

      if (Math.abs(temp - tempBefore) > 1e-6) applyThermalEnergyAdjustment(dt, direction);
    }

    function applyVaporizationTranslationalEnergy(dt) {
      const tempNorm = clamp((temp - MIN_T) / (MAX_T - MIN_T), 0, 1);
      const vaporProgress = clamp(boilProgress, 0, 1);

      molecules.forEach(m => {
        if (Math.random() > THERMAL_ENERGY_SAMPLE_RATIO) return;
        const a = rand(0, Math.PI * 2);
        const boost = (260 + 560 * tempNorm) * (0.75 + 1.65 * vaporProgress) * dt;
        m.vx += Math.cos(a) * boost;
        m.vy += Math.sin(a) * boost;
      });
    }

    function applyThermalEnergyAdjustment(dt, heatSign) {
      const tempNorm = clamp((temp - MIN_T) / (MAX_T - MIN_T), 0, 1);
      const gasness = clamp(boilProgress, 0, 1);
      const fluidness = phase === 'solid' ? 0 : 1;
      const isLiquidEnergyMode = phase === 'liquid' && gasness < 0.20;
      const isGasEnergyMode = phase === 'gas' || gasness > 0.85;

      if (isGasEnergyMode) {
        if (heatSign > 0) {
          gasRestitution = clamp(gasRestitution + (0.010 + 0.010 * tempNorm) * dt, GAS_RESTITUTION_MIN, GAS_RESTITUTION_MAX);
        } else {
          gasRestitution = clamp(gasRestitution - (0.55 + 0.45 * tempNorm) * dt, GAS_RESTITUTION_MIN, GAS_RESTITUTION_MAX);
        }
        return;
      }

      molecules.forEach(m => {
        if (Math.random() > THERMAL_ENERGY_SAMPLE_RATIO) return;

        if (heatSign > 0) {
          if (isLiquidEnergyMode) {
            const translationalKick = (2.5 + 5.0 * tempNorm) * dt;
            const kickAngle = rand(0, Math.PI * 2);
            m.vx += Math.cos(kickAngle) * translationalKick;
            m.vy += Math.sin(kickAngle) * translationalKick;
            const angularBoost = 1 + (0.16 + 0.30 * tempNorm) * dt * fluidness;
            if (m.w !== undefined) m.w *= angularBoost;
          } else {
            const translationalBoost = 1 + (0.10 + 0.18 * tempNorm) * dt * fluidness;
            const angularBoost = 1 + (0.14 + 0.24 * tempNorm + 0.10 * gasness) * dt * fluidness;
            m.vx *= translationalBoost;
            m.vy *= translationalBoost;
            if (m.w !== undefined) m.w *= angularBoost;
          }
        } else {
          if (isLiquidEnergyMode) {
            const angularDamp = 1 - (3.00 + 3.60 * tempNorm) * dt * fluidness;
            if (m.w !== undefined) m.w *= clamp(angularDamp, 0.30, 1);
          } else {
            const translationalDamp = 1 - (1.05 + 1.20 * tempNorm) * dt * fluidness;
            const angularDamp = 1 - (1.35 + 1.55 * tempNorm + 0.70 * gasness) * dt * fluidness;
            m.vx *= clamp(translationalDamp, 0.55, 1);
            m.vy *= clamp(translationalDamp, 0.55, 1);
            if (m.w !== undefined) m.w *= clamp(angularDamp, 0.48, 1);
          }
        }
      });
    }

    function activeStructure() {
      if (boilProgress > 0 && boilProgress < 1) return 0.1;
      if (meltProgress > 0 && meltProgress < 1) return lerp(1.0, 0.0, meltProgress);
      if (phase === 'solid') return 1;
      if (phase === 'liquid') return 0.0;
      return 0.02;
    }

    function updateMolecules(dt) {
      const b = containerBounds();
      const tempNorm = clamp((temp - MIN_T) / (MAX_T - MIN_T), 0, 1);
      const gasness = clamp(boilProgress, 0, 1);
      const liquidness = clamp(meltProgress, 0, 1) * (1 - gasness);
      const crystallinity = smoothstep(clamp(1 - meltProgress, 0, 1));
      const solidWeight = crystallinity;
      const fluidWeight = 1 - solidWeight;

      const localAngleDiff = (a, c) => {
        let d = (a - c + Math.PI) % (Math.PI * 2);
        if (d < 0) d += Math.PI * 2;
        return d - Math.PI;
      };

      const localMeanAngle = (a, c) => Math.atan2(Math.sin(a) + Math.sin(c), Math.cos(a) + Math.cos(c));

      molecules.forEach((m) => {
        const t = performance.now() * 0.001 + m.seed;
        if (m.lockedAngle === undefined) m.lockedAngle = m.angle;

        const translationalSpeed = lerp(58, 210, gasness) * (0.75 + 2.20 * tempNorm);
        m.vx += rand(-1, 1) * translationalSpeed * dt * 2.6 * fluidWeight;
        m.vy += rand(-1, 1) * translationalSpeed * dt * 2.6 * fluidWeight;

        const isLiquidHeatingMode = direction > 0 && phase === 'liquid' && gasness < 0.20;
        const isVaporizingMode = direction > 0 && boilProgress > 0 && boilProgress < 1;
        const isGasHeatingMode = direction > 0 && (phase === 'gas' || gasness > 0.85) && !isVaporizingMode;
        if (fluidWeight > 0.05 && direction > 0 && !isLiquidHeatingMode && !isGasHeatingMode) {
          const targetSpeed = (32 + 105 * tempNorm + 95 * gasness) * fluidWeight;
          const vmag = Math.hypot(m.vx, m.vy);
          if (vmag < targetSpeed) {
            const kickAngle = rand(0, Math.PI * 2);
            const kick = (targetSpeed - vmag) * 0.008;
            m.vx += Math.cos(kickAngle) * kick;
            m.vy += Math.sin(kickAngle) * kick;
          }
        }

        if (fluidWeight > 0.05) {
          const speedCap = (45 + 120 * tempNorm + 115 * gasness) * fluidWeight + 25;
          const vmag = Math.hypot(m.vx, m.vy);
          if (vmag > speedCap) {
            m.vx = m.vx / vmag * speedCap;
            m.vy = m.vy / vmag * speedCap;
          }
        }

        if (liquidness > 0.1) {
          const coolingSettleBoost = direction < 0 && phase === 'liquid' ? 3.8 : 1.0;
          m.vy += (b.floor - 42 - m.y) * 0.050 * coolingSettleBoost * dt * fluidWeight;
          m.vx += rand(-1, 1) * 18 * dt * fluidWeight;
        }

        const inBoilingTransition = boilProgress > 0 && boilProgress < 1;
        const isPureGas = phase === 'gas' && boilProgress >= 1;
        const hasGravity = !isPureGas && (temp <= BOIL_T || inBoilingTransition || phase === 'solid');
        if (hasGravity) {
          const coolingBoost = direction < 0 ? COOLING_GRAVITY_BOOST : 0;
          const gravity = GRAVITY_BELOW_BOILING + coolingBoost;
          m.vy += gravity * dt;
        }

        if (solidWeight > 0.001) {
          const neighbors = molecules
            .filter(n => n !== m)
            .map(n => {
              const dx = n.x - m.x;
              const dy = n.y - m.y;
              return { n, d: Math.hypot(dx, dy), a: Math.atan2(dy, dx) };
            })
            .filter(x => x.d > 0.01 && x.d < ICE_EDGE * 1.85)
            .sort((a, b) => a.d - b.d)
            .slice(0, 4);

          neighbors.forEach(nb => {
            const desired = ICE_EDGE;
            const nx = Math.cos(nb.a);
            const ny = Math.sin(nb.a);
            let force = 0;
            if (nb.d < desired * 0.78) force = -0.55 * (desired * 0.78 - nb.d);
            else if (nb.d < desired * 0.96) force = -0.18 * (desired * 0.96 - nb.d);
            else if (nb.d > desired * 1.15) force = 0.055 * (nb.d - desired * 1.15);

            const h1 = m.angle + WATER_HALF_ANGLE;
            const h2 = m.angle - WATER_HALF_ANGLE;
            const d1 = Math.abs(localAngleDiff(nb.a, h1));
            const d2 = Math.abs(localAngleDiff(nb.a, h2));
            const badApproach = Math.min(d1, d2) < WATER_HALF_ANGLE * 0.70 && nb.d < desired * 1.05;

            if (badApproach) {
              const overlap = (WATER_HALF_ANGLE * 0.70 - Math.min(d1, d2)) / (WATER_HALF_ANGLE * 0.70);
              force -= (0.20 + 0.35 * overlap) * (desired * 1.05 - nb.d);
              m.lockedAngle += (d1 < d2 ? 1 : -1) * 0.0012 * solidWeight;
            }

            const f = force * solidWeight * dt;
            m.vx += nx * f;
            m.vy += ny * f;
            nb.n.vx -= nx * f * 0.25;
            nb.n.vy -= ny * f * 0.25;
          });

          if (neighbors.length >= 2) {
            let bestA = neighbors[0].a;
            let bestB = neighbors[1].a;
            let bestScore = Infinity;

            for (let i = 0; i < neighbors.length; i++) {
              for (let j = i + 1; j < neighbors.length; j++) {
                const gap = Math.abs(localAngleDiff(neighbors[i].a, neighbors[j].a));
                const score = Math.abs(gap - 2 * WATER_HALF_ANGLE) + 0.01 * (neighbors[i].d + neighbors[j].d);
                if (score < bestScore) {
                  bestScore = score;
                  bestA = neighbors[i].a;
                  bestB = neighbors[j].a;
                }
              }
            }

            const target = localMeanAngle(bestA, bestB);
            const dLock = localAngleDiff(target, m.lockedAngle);
            m.lockedAngle += dLock * (0.003 + 0.012 * solidWeight);
          }
        }

        m.x += m.vx * dt;
        m.y += m.vy * dt;

        const baseAngle = m.lockedAngle ?? m.crystalAngle ?? m.angle;
        const solidTempResponse = Math.pow(tempNorm, 1.65);
        const solidVibrationFreq = 18.0 + 96.0 * solidTempResponse;
        const solidVibrationAmp = (0.010 + 1.85 * solidTempResponse) * solidWeight;
        const vibrationTarget = baseAngle + Math.sin(t * solidVibrationFreq) * solidVibrationAmp;
        const dVib = localAngleDiff(vibrationTarget, m.angle);
        const vibrationRestore = (0.095 + 0.170 * solidWeight) * solidWeight;
        m.angle += dVib * vibrationRestore;

        const fluidRotationSpeed = 0.45 + 8.2 * tempNorm + 4.8 * gasness;
        const targetAngularSpeed = fluidRotationSpeed * fluidWeight;
        const spinSign = Math.abs(m.w) > 0.001 ? Math.sign(m.w) : (m.av >= 0 ? 1 : -1);
        if (fluidWeight > 0.05) {
          const currentSpin = Math.abs(m.w);
          if (direction > 0 && !(phase === 'gas' || gasness > 0.85) && currentSpin < targetAngularSpeed) {
            m.w += spinSign * (targetAngularSpeed - currentSpin) * 0.020;
          }
          const spinCap = Math.max(0.35, targetAngularSpeed * 1.35);
          if (Math.abs(m.w) > spinCap) m.w = Math.sign(m.w) * spinCap;
          m.w *= 0.995;
        } else {
          m.w *= 0.90;
        }
        m.angle += m.w * dt * fluidWeight;

        m.renderJitterX = 0;
        m.renderJitterY = 0;

        const damping = lerp(0.995, 0.925, solidWeight);
        m.vx *= damping;
        m.vy *= damping;

        const r = MOLECULE_COLLISION_RADIUS;
        if (m.x < b.x + r) { m.x = b.x + r; m.vx = Math.abs(m.vx) * 0.45; }
        if (m.x > b.x + b.w - r) { m.x = b.x + b.w - r; m.vx = -Math.abs(m.vx) * 0.45; }
        if (m.y < b.y + r) { m.y = b.y + r; m.vy = Math.abs(m.vy) * 0.45; }
        if (m.y > b.floor - r) { m.y = b.floor - r; m.vy = -Math.abs(m.vy) * 0.45; }
      });

      collideMolecules(gasness, crystallinity);
    }

    function moleculeRigidSites(m) {
      const a = m.angle;
      const h1x = Math.cos(a + WATER_HALF_ANGLE) * WATER_BOND;
      const h1y = Math.sin(a + WATER_HALF_ANGLE) * WATER_BOND;
      const h2x = Math.cos(a - WATER_HALF_ANGLE) * WATER_BOND;
      const h2y = Math.sin(a - WATER_HALF_ANGLE) * WATER_BOND;
      return [
        { x: m.x, y: m.y, rx: 0, ry: 0, r: WATER_O_RADIUS },
        { x: m.x + h1x, y: m.y + h1y, rx: h1x, ry: h1y, r: WATER_H_RADIUS },
        { x: m.x + h2x, y: m.y + h2y, rx: h2x, ry: h2y, r: WATER_H_RADIUS }
      ];
    }

    function applyRigidImpulse(a, b, contact) {
      const nx = contact.nx;
      const ny = contact.ny;
      const rax = contact.cx - a.x;
      const ray = contact.cy - a.y;
      const rbx = contact.cx - b.x;
      const rby = contact.cy - b.y;

      const vaX = a.vx - a.w * ray;
      const vaY = a.vy + a.w * rax;
      const vbX = b.vx - b.w * rby;
      const vbY = b.vy + b.w * rbx;

      const rvx = vbX - vaX;
      const rvy = vbY - vaY;
      const velAlongNormal = rvx * nx + rvy * ny;

      const raCrossN = rax * ny - ray * nx;
      const rbCrossN = rbx * ny - rby * nx;
      const invMass = 1 / MOLECULE_MASS;
      const invI = 1 / MOLECULE_INERTIA;
      const denom = invMass + invMass + raCrossN * raCrossN * invI + rbCrossN * rbCrossN * invI;

      const currentGasness = clamp(boilProgress, 0, 1);
      const dynamicFluidRestitution = lerp(0.45, gasRestitution, currentGasness);
      const restitution = phase === 'solid' ? 0.25 : dynamicFluidRestitution;
      const j = velAlongNormal < 0 ? (-(1 + restitution) * velAlongNormal / denom) : 0;

      a.vx -= j * nx * invMass;
      a.vy -= j * ny * invMass;
      a.w -= j * raCrossN * invI;

      b.vx += j * nx * invMass;
      b.vy += j * ny * invMass;
      b.w += j * rbCrossN * invI;

      const correction = contact.overlap * 0.48;
      a.x -= nx * correction;
      a.y -= ny * correction;
      b.x += nx * correction;
      b.y += ny * correction;
    }

    function collideMolecules(gasness, structure) {
      const fluidWeight = 1 - structure;
      const useRigidCollision = fluidWeight > 0.18 || gasness > 0.05;

      if (useRigidCollision) {
        for (let i = 0; i < molecules.length; i++) {
          for (let j = i + 1; j < molecules.length; j++) {
            const a = molecules[i];
            const b = molecules[j];
            const sitesA = moleculeRigidSites(a);
            const sitesB = moleculeRigidSites(b);

            let best = null;
            for (const sa of sitesA) {
              for (const sb of sitesB) {
                const dx = sb.x - sa.x;
                const dy = sb.y - sa.y;
                const d = Math.hypot(dx, dy) || 0.0001;
                const minD = sa.r + sb.r + 1.5;
                const overlap = minD - d;
                if (overlap > 0 && (!best || overlap > best.overlap)) {
                  const nx = dx / d;
                  const ny = dy / d;
                  best = {
                    nx, ny, overlap,
                    cx: (sa.x + nx * sa.r + sb.x - nx * sb.r) * 0.5,
                    cy: (sa.y + ny * sa.r + sb.y - ny * sb.r) * 0.5
                  };
                }
              }
            }

            if (best) applyRigidImpulse(a, b, best);
          }
        }
        return;
      }

      const minD = (MOLECULE_COLLISION_RADIUS + MOLECULE_GAP) * 2;
      const minD2 = minD * minD;
      for (let i = 0; i < molecules.length; i++) {
        for (let j = i + 1; j < molecules.length; j++) {
          const a = molecules[i];
          const b = molecules[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const d2 = dx * dx + dy * dy;

          if (d2 > 0.01 && d2 < minD2) {
            const d = Math.sqrt(d2);
            const nx = dx / d;
            const ny = dy / d;
            const strength = (0.42 + 0.38 * gasness) * (1 - structure * 0.45);
            const push = (minD - d) * strength;

            a.x -= nx * push;
            a.y -= ny * push;
            b.x += nx * push;
            b.y += ny * push;
          }
        }
      }
    }

    function drawContainer() {
      const b = containerBounds();
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#f8fafc';
      ctx.fillRect(b.x, b.y, b.w, b.floor - b.y);

      ctx.strokeStyle = '#94a3b8';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(b.x, b.floor);
      ctx.lineTo(b.x + b.w, b.floor);
      ctx.lineTo(b.x + b.w, b.y);
      ctx.stroke();

      ctx.strokeStyle = '#cbd5e1';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(b.x + 6, b.y);
      ctx.lineTo(b.x + b.w - 6, b.y);
      ctx.stroke();

      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(b.x, b.floor);
      ctx.lineTo(b.x + b.w, b.floor);
      ctx.stroke();
    }

    function phaseHeatDiagramInfo() {
      const melting = meltProgress > 0.001 && meltProgress < 0.999;
      const boiling = boilProgress > 0.001 && boilProgress < 0.999;
      if (direction === 0) return null;

      const absorbing = direction > 0;
      const process = boiling
        ? (absorbing ? '기화 중' : '응결 중')
        : melting
          ? (absorbing ? '융해 중' : '응고 중')
          : (absorbing ? '가열 중' : '냉각 중');

      return {
        absorbing,
        process,
        title: absorbing ? '열 흡수' : '열 방출',
        color: absorbing ? '#f97316' : '#2563eb',
        softColor: absorbing ? 'rgba(249, 115, 22, 0.13)' : 'rgba(37, 99, 235, 0.13)',
        lineColor: absorbing ? 'rgba(249, 115, 22, 0.95)' : 'rgba(37, 99, 235, 0.95)'
      };
    }

    function drawSchematicArrow(x1, y1, x2, y2, color, width = 4) {
      const angle = Math.atan2(y2 - y1, x2 - x1);
      const head = Math.max(10, width * 3.2);

      ctx.save();
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - Math.cos(angle - Math.PI / 6) * head, y2 - Math.sin(angle - Math.PI / 6) * head);
      ctx.lineTo(x2 - Math.cos(angle + Math.PI / 6) * head, y2 - Math.sin(angle + Math.PI / 6) * head);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawPhaseHeatDiagram() {
      const info = phaseHeatDiagramInfo();
      if (!info) return;

      const b = containerBounds();
      const pulse = 0.74 + 0.26 * Math.sin(performance.now() * 0.005);
      const bottomInside = b.floor + 8;
      const bottomOutside = Math.min(H - 18, b.floor + Math.max(28, H * 0.085));
      const arrowCount = W < 520 ? 3 : 5;
      const startX = b.x + b.w * 0.20;
      const endX = b.x + b.w * 0.80;

      ctx.save();
      ctx.globalAlpha = pulse;

      for (let i = 0; i < arrowCount; i++) {
        const t = arrowCount === 1 ? 0.5 : i / (arrowCount - 1);
        const x = lerp(startX, endX, t);
        if (info.absorbing) drawSchematicArrow(x, bottomOutside, x, bottomInside, info.lineColor, 4.2);
        else drawSchematicArrow(x, bottomInside, x, bottomOutside, info.lineColor, 4.2);

        ctx.fillStyle = info.color;
        ctx.font = '700 13px system-ui';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText('Q', x + 8, (bottomInside + bottomOutside) / 2);
      }

      const sideGap = Math.min(42, Math.max(22, W * 0.045));
      const canDrawSideArrows = b.x > sideGap + 10 && W - (b.x + b.w) > sideGap + 10;
      if (canDrawSideArrows) {
        const yMid1 = b.y + (b.floor - b.y) * 0.34;
        const yMid2 = b.y + (b.floor - b.y) * 0.62;
        [yMid1, yMid2].forEach(y => {
          if (info.absorbing) {
            drawSchematicArrow(b.x - sideGap, y, b.x - 7, y, info.lineColor, 3.6);
            drawSchematicArrow(b.x + b.w + sideGap, y, b.x + b.w + 7, y, info.lineColor, 3.6);
          } else {
            drawSchematicArrow(b.x - 7, y, b.x - sideGap, y, info.lineColor, 3.6);
            drawSchematicArrow(b.x + b.w + 7, y, b.x + b.w + sideGap, y, info.lineColor, 3.6);
          }
        });
      }

      ctx.restore();
    }

    function drawMolecule(m) {
      const ox = m.x;
      const oy = m.y;
      const hx1 = ox + Math.cos(m.angle + WATER_HALF_ANGLE) * WATER_BOND;
      const hy1 = oy + Math.sin(m.angle + WATER_HALF_ANGLE) * WATER_BOND;
      const hx2 = ox + Math.cos(m.angle - WATER_HALF_ANGLE) * WATER_BOND;
      const hy2 = oy + Math.sin(m.angle - WATER_HALF_ANGLE) * WATER_BOND;

      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.38)';
      ctx.shadowBlur = 3;
      ctx.shadowOffsetY = 1.5;

      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(hx1, hy1, WATER_H_RADIUS, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#ff3b2f';
      ctx.beginPath(); ctx.arc(ox, oy, WATER_O_RADIUS, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(hx2, hy2, WATER_H_RADIUS, 0, Math.PI * 2); ctx.fill();

      ctx.restore();
    }

    function drawGraph() {
      gtx.clearRect(0, 0, graphW, graphH);
      gtx.fillStyle = '#ffffff';
      gtx.fillRect(0, 0, graphW, graphH);

      const isEnergyMode = graphMode === 'energy';

      if (isEnergyMode) {
        drawInternalEnergyBarGraph();
        return;
      }

      const padL = 52, padR = 16, padT = 18, padB = 36;
      const x0 = padL, y0 = graphH - padB, x1 = graphW - padR, y1 = padT;
      const yMin = MIN_T;
      const yMax = MAX_T;

      gtx.strokeStyle = '#e5e7eb';
      gtx.lineWidth = 1;

      for (let T of [0, 100]) {
        const y = y0 - (T - yMin) / (yMax - yMin) * (y0 - y1);
        gtx.beginPath();
        gtx.moveTo(x0, y);
        gtx.lineTo(x1, y);
        gtx.stroke();

        gtx.fillStyle = '#6b7280';
        gtx.font = '12px system-ui';
        gtx.fillText(T + '℃', 8, y + 4);
      }

      gtx.strokeStyle = '#9ca3af';
      gtx.lineWidth = 1.5;
      gtx.beginPath();
      gtx.moveTo(x0, y1);
      gtx.lineTo(x0, y0);
      gtx.lineTo(x1, y0);
      gtx.stroke();

      if (history.length > 1) {
        const span = Math.max(60, history[history.length - 1].t);
        gtx.strokeStyle = direction >= 0 ? '#ff8a1f' : '#2563eb';
        gtx.lineWidth = 3;
        gtx.beginPath();

        history.forEach((p, idx) => {
          const x = x0 + (p.t / span) * (x1 - x0);
          const y = y0 - (p.temp - yMin) / (yMax - yMin) * (y0 - y1);
          if (idx === 0) gtx.moveTo(x, y);
          else gtx.lineTo(x, y);
        });

        gtx.stroke();
      }

      gtx.fillStyle = '#374151';
      gtx.font = '12px system-ui';
      gtx.fillText('시간', graphW - 42, graphH - 10);

      gtx.save();
      gtx.translate(14, 62);
      gtx.rotate(-Math.PI / 2);
      gtx.fillText('온도', 0, 0);
      gtx.restore();
    }

    function drawInternalEnergyBarGraph() {
      const energy = particleInternalEnergyValue();
      const maxEnergy = 130;
      const ratio = clamp(energy / maxEnergy, 0, 1);

      const padT = 26;
      const padB = 34;
      const usableH = graphH - padT - padB;
      const barW = Math.min(130, graphW * 0.34);
      const barH = usableH * ratio;
      const x = graphW / 2 - barW / 2;
      const y = graphH - padB - barH;

      gtx.fillStyle = '#f8fafc';
      gtx.fillRect(0, 0, graphW, graphH);

      gtx.strokeStyle = '#e5e7eb';
      gtx.lineWidth = 1;
      for (let E of [25, 50, 75, 100, 125]) {
        const gy = graphH - padB - (E / maxEnergy) * usableH;
        gtx.beginPath();
        gtx.moveTo(42, gy);
        gtx.lineTo(graphW - 42, gy);
        gtx.stroke();

        gtx.fillStyle = '#9ca3af';
        gtx.font = '12px system-ui';
        gtx.textAlign = 'right';
      }

      const gradient = gtx.createLinearGradient(0, graphH - padB, 0, padT);
      gradient.addColorStop(0, '#60a5fa');
      gradient.addColorStop(0.45, '#34c759');
      gradient.addColorStop(1, '#ff8a1f');

      gtx.fillStyle = '#e5e7eb';
      roundRect(gtx, x, padT, barW, usableH, 18);
      gtx.fill();

      gtx.fillStyle = gradient;
      roundRect(gtx, x, y, barW, barH, 18);
      gtx.fill();

      gtx.strokeStyle = '#9ca3af';
      gtx.lineWidth = 1.5;
      roundRect(gtx, x, padT, barW, usableH, 18);
      gtx.stroke();

      gtx.textAlign = 'left';
    }

    function roundRect(context, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      context.beginPath();
      context.moveTo(x + radius, y);
      context.lineTo(x + w - radius, y);
      context.quadraticCurveTo(x + w, y, x + w, y + radius);
      context.lineTo(x + w, y + h - radius);
      context.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      context.lineTo(x + radius, y + h);
      context.quadraticCurveTo(x, y + h, x, y + h - radius);
      context.lineTo(x, y + radius);
      context.quadraticCurveTo(x, y, x + radius, y);
      context.closePath();
    }

    function updateUI() {
      tempText.textContent = temp.toFixed(1);
      modeBadge.textContent = direction > 0 ? '가열 중' : direction < 0 ? '냉각 중' : '정지';
      heatBtn.classList.toggle('off', direction !== 1);
      coolBtn.classList.toggle('off', direction !== -1);
      solidStart.classList.toggle('active', phase === 'solid' && meltProgress <= 0.02);
      liquidStart.classList.toggle('active', phase === 'liquid' && boilProgress <= 0.02 && meltProgress >= 0.98);
      gasStart.classList.toggle('active', phase === 'gas' && boilProgress >= 0.98);
      tempBar.style.width = `${(temp - MIN_T) / (MAX_T - MIN_T) * 100}%`;
      meltFill.style.width = `${meltProgress * 100}%`;
      boilFill.style.width = `${boilProgress * 100}%`;

      if (boilProgress > 0 && boilProgress < 1) {
        stateText.textContent = direction > 0
          ? '기화 중: 100℃에서 온도는 거의 변하지 않고, 액체 배열이 풀리며 분자들이 넓게 퍼집니다.'
          : '응결 중: 100℃에서 온도는 거의 변하지 않고, 흩어진 분자들이 현재 위치에서 서서히 가까워집니다.';
      } else if (meltProgress > 0 && meltProgress < 1) {
        stateText.textContent = direction > 0
          ? '융해 중: 0℃에서 온도는 거의 변하지 않고, 결정 배열이 자연스럽게 흐트러집니다.'
          : '응고 중: 0℃에서 온도는 거의 변하지 않고, 분자들이 그 자리에서 결정 형태로 정렬됩니다.';
      } else if (phase === 'solid') {
        stateText.textContent = '고체: 입자가 정해진 자리 주변에서 진동합니다. 온도가 높을수록 진동이 빨라집니다.';
      } else if (phase === 'liquid') {
        stateText.textContent = '액체: 입자가 가까운 거리를 유지하며 서로 미끄러지듯 이동합니다. 온도가 높을수록 운동이 활발해집니다.';
      } else {
        stateText.textContent = '기체: 입자가 넓게 퍼져 빠르게 운동합니다. 온도가 높을수록 충돌과 이동이 더 활발해집니다.';
      }
    }

    function updateGraphToggleUI() {
      graphModeText.textContent = graphMode === 'energy' ? '활발한 정도' : '온도';
      graphTitleEl.textContent = graphMode === 'energy' ? '입자의 활발한 정도 그래프' : '온도-시간 그래프';
      graphSubEl.textContent = graphMode === 'energy'
        ? '현재의 입자가 활발한 정도를 막대그래프로 나타냅니다.'
        : '0℃와 100℃에서 온도 정체 구간이 나타납니다.';
    }

    function frame(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      time += dt;
      updateThermal(dt);
      updateMolecules(dt);

      if (history.length === 0 || time - history[history.length - 1].t > 0.12) {
        history.push({ t: time, temp, energy: averageEnergyValue() });
        if (history.length > 520) history.shift();
        if (history.length && history[0].t > 0) {
          const base = history[0].t;
          history = history.map(p => ({ t: p.t - base, temp: p.temp, energy: p.energy }));
          time -= base;
        }
      }

      drawContainer();
      drawPhaseHeatDiagram();
      molecules.forEach(drawMolecule);
      drawGraph();
      updateUI();
      requestAnimationFrame(frame);
    }

    heatBtn.addEventListener('click', () => direction = 1);
    coolBtn.addEventListener('click', () => direction = -1);
    pauseBtn.addEventListener('click', () => direction = 0);
    resetBtn.addEventListener('click', () => setState(phase, true));
    solidStart.addEventListener('click', () => setStart('solid'));
    liquidStart.addEventListener('click', () => setStart('liquid'));
    gasStart.addEventListener('click', () => setStart('gas'));

    graphToggle.addEventListener('change', () => {
      graphMode = graphToggle.checked ? 'energy' : 'temperature';
      updateGraphToggleUI();
    });

    window.addEventListener('resize', resize);

    resize();
    makeMolecules('solid');
    history = [{ t: 0, temp, energy: averageEnergyValue() }];
    updateGraphToggleUI();
    updateUI();
    requestAnimationFrame((t) => { last = t; requestAnimationFrame(frame); });
  </script>
</body>
</html>
