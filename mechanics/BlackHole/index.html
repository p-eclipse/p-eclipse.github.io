<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kerr Black Hole Visualizer</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #02030a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }
    #app {
      position: fixed;
      inset: 0;
    }
    canvas {
      display: block;
    }
    .hud, .controls {
      position: fixed;
      z-index: 10;
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(10,12,20,.72), rgba(4,5,10,.46));
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
      border-radius: 22px;
      box-shadow: 0 20px 50px rgba(0,0,0,.38);
    }
    .hud {
      top: 18px;
      left: 18px;
      width: min(470px, calc(100vw - 36px));
      padding: 16px;
      pointer-events: none;
      user-select: none;
    }
    .hud h1 {
      margin: 0 0 8px;
      font-size: 15px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .hud p {
      margin: 0;
      font-size: 12.5px;
      line-height: 1.58;
      color: rgba(255,255,255,.68);
    }
    .controls {
      top: 18px;
      right: 18px;
      width: min(390px, calc(100vw - 36px));
      display: grid;
      gap: 10px;
      padding: 14px;
      user-select: none;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 32px;
    }
    .sliderRow {
      display: grid;
      grid-template-columns: 110px 1fr 48px;
      gap: 10px;
      align-items: center;
    }
    label {
      font-size: 12.5px;
      color: rgba(255,255,255,.84);
    }
    .value {
      font-size: 12px;
      text-align: right;
      color: rgba(255,255,255,.72);
      font-variant-numeric: tabular-nums;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #ffb36a;
    }
    .switch {
      position: relative;
      width: 54px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      cursor: pointer;
      padding: 0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    }
    .switch::after {
      content: "";
      position: absolute;
      width: 28px;
      height: 28px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 3px 12px rgba(0,0,0,.42);
      transition: transform .18s cubic-bezier(.2,.8,.2,1);
    }
    .switch.on {
      background: linear-gradient(90deg, #b9d9ff, #ffb46b);
    }
    .switch.on::after {
      transform: translateX(22px);
    }
    .badge {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 10;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      background: rgba(6,8,14,.5);
      backdrop-filter: blur(14px);
      color: rgba(255,255,255,.68);
      font-size: 12px;
      pointer-events: none;
      user-select: none;
    }
    @media (max-width: 760px) {
      .hud { display: none; }
      .controls {
        top: auto;
        left: 16px;
        right: 16px;
        bottom: 16px;
        width: auto;
      }
      .badge { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <section class="hud">
    <h1>Kerr Black Hole Visualizer</h1>
    <p>
      좌표 그리드는 먼 곳에서 민코프스키식 정육면체 격자를 이루고, 블랙홀에 가까워질수록
      Kerr/Doran rain-frame 해석에 따라 안쪽으로 낙하하며 frame dragging으로 비틀립니다.
      강착원반은 얇은 광선추적 셰이더로 렌더링되며, red/blue shift와 회전하는 하이라이트를 통해
      실제 공전이 눈에 보이도록 구성했습니다.
    </p>
  </section>

  <section class="controls">
    <div class="row">
      <label>3D 시공간 좌표축</label>
      <button id="gridToggle" class="switch on" aria-label="3D 시공간 좌표축 토글"></button>
    </div>
    <div class="row">
      <label>시험입자 궤적</label>
      <button id="particleToggle" class="switch on" aria-label="시험입자 궤적 토글"></button>
    </div>
    <div class="sliderRow">
      <label>블랙홀 질량</label>
      <input id="massSlider" type="range" min="0.35" max="1.70" step="0.01" value="0.92" />
      <span id="massValue" class="value">0.92</span>
    </div>
    <div class="sliderRow">
      <label>블랙홀 회전</label>
      <input id="spinSlider" type="range" min="0.00" max="1.80" step="0.01" value="0.72" />
      <span id="spinValue" class="value">0.72</span>
    </div>
    <div class="sliderRow">
      <label>관찰자 시간</label>
      <input id="timeSlider" type="range" min="0.05" max="3.00" step="0.01" value="1.00" />
      <span id="timeValue" class="value">1.00</span>
    </div>
    <div class="sliderRow">
      <label>격자 밝기</label>
      <input id="gridBrightSlider" type="range" min="0.25" max="2.50" step="0.01" value="1.35" />
      <span id="gridBrightValue" class="value">1.35</span>
    </div>
  </section>

  <div class="badge">Drag: orbit camera · Wheel/Pinch: zoom</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const app = document.getElementById("app");

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: "high-performance"
    });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 1.25));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.26;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x02030a);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.04, 2000);
    camera.position.set(0, 10, 25);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.045;
    controls.rotateSpeed = 0.48;
    controls.zoomSpeed = 0.62;
    controls.minDistance = 7;
    controls.maxDistance = 120;
    controls.target.set(0, 0.4, 0);

    const params = {
      grid: true,
      particles: true,
      mass: 0.92,
      spin: 0.72,
      timeScale: 1.00,
      gridBright: 1.35
    };

    const clock = new THREE.Clock();

    const uniforms = {
      uTime: { value: 0 },
      uSpin: { value: params.spin },
      uLensMass: { value: params.mass },
      uFlow: { value: params.mass },
      uGridBright: { value: params.gridBright },
      uCameraPos: { value: camera.position.clone() }
    };

    scene.add(new THREE.AmbientLight(0x8fa8ff, 0.08));

    // -----------------------------
    // Black hole shadow sphere
    // -----------------------------
    const blackHoleGroup = new THREE.Group();
    scene.add(blackHoleGroup);

    const horizon = new THREE.Mesh(
      new THREE.SphereGeometry(2.05, 64, 32),
      new THREE.ShaderMaterial({
        depthWrite: true,
        depthTest: true,
        vertexShader: `
          void main(){
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          void main(){
            gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
          }
        `
      })
    );
    horizon.renderOrder = 2;
    blackHoleGroup.add(horizon);

    // -----------------------------
    // Accretion disk ray-traced billboard
    // -----------------------------
    const diskTracer = new THREE.Mesh(
      new THREE.PlaneGeometry(120, 120, 1, 1),
      new THREE.ShaderMaterial({
        uniforms: uniforms,
        transparent: true,
        depthWrite: false,
        depthTest: false,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        vertexShader: `
          varying vec3 vWorld;
          void main(){
            vec4 w = modelMatrix * vec4(position, 1.0);
            vWorld = w.xyz;
            gl_Position = projectionMatrix * viewMatrix * w;
          }
        `,
        fragmentShader: `
          precision highp float;
          varying vec3 vWorld;

          uniform vec3 uCameraPos;
          uniform float uTime;
          uniform float uSpin;
          uniform float uLensMass;

          const float PI = 3.141592653589793;
          const float TAU = 6.283185307179586;
          const float R_OUT = 11.4;
          const float PHOTON_GAP = 0.72;

          float hash(float n){
            return fract(sin(n) * 43758.5453123);
          }

          float noise(vec2 p){
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            float a = hash(i.x + i.y * 57.0);
            float b = hash(i.x + 1.0 + i.y * 57.0);
            float c = hash(i.x + (i.y + 1.0) * 57.0);
            float d = hash(i.x + 1.0 + (i.y + 1.0) * 57.0);
            return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
          }

          float angDiff(float a, float b){
            return atan(sin(a - b), cos(a - b));
          }

          float eventHorizonRadius(){
            return 2.05 * (0.72 + 0.30 * uLensMass);
          }

          float photonOrbitRadius(){
            float EH = eventHorizonRadius();
            return EH * 1.50;
          }

          float photonRingHalfWidth(){
            return max(0.055, eventHorizonRadius() * 0.035);
          }

          vec4 sampleDisk(vec3 p, vec3 rd, float order, float attenuation){
            float r = length(p.xz);
            float phi = atan(p.z, p.x);

            float rPhoton = photonOrbitRadius();
            float wPhoton = photonRingHalfWidth();
            float R_IN = max(3.12, rPhoton + PHOTON_GAP);
            float mainInner = max(R_IN, rPhoton + PHOTON_GAP);

            float mainDiskWindow =
              smoothstep(mainInner, mainInner + 0.16, r) *
              (1.0 - smoothstep(R_OUT - 0.55, R_OUT, r));

            float photonCore = exp(-pow((r - rPhoton) / wPhoton, 2.0));
            float photonDiskWindow =
              smoothstep(rPhoton - 2.2 * wPhoton, rPhoton - 0.45 * wPhoton, r) *
              (1.0 - smoothstep(rPhoton + 0.45 * wPhoton, rPhoton + 2.2 * wPhoton, r));

            float cleanGap =
              1.0 - smoothstep(rPhoton + 2.2 * wPhoton, rPhoton + PHOTON_GAP, r) *
              (1.0 - smoothstep(mainInner, mainInner + 0.18, r));

            float radialWindow = mainDiskWindow;

            float omega = 2.8 / pow(max(r, 2.7), 1.5);

            float wideRings = 0.0;
            wideRings += 0.72 * exp(-pow(sin(r * 2.35 + 0.15) / 0.31, 2.0));
            wideRings += 0.54 * exp(-pow(sin(r * 3.15 + 1.20) / 0.22, 2.0));
            wideRings += 0.42 * exp(-pow(sin(r * 4.60 + 2.10) / 0.17, 2.0));

            float thinRings = 0.0;
            thinRings += 0.44 * pow(smoothstep(0.50, 1.00, 0.5 + 0.5 * sin(r * 6.80 + 0.40)), 2.7);
            thinRings += 0.32 * pow(smoothstep(0.56, 1.00, 0.5 + 0.5 * sin(r * 9.70 + 2.80)), 3.8);
            thinRings += 0.22 * pow(smoothstep(0.62, 1.00, 0.5 + 0.5 * sin(r * 13.40 + 1.70)), 5.0);

            float microRings = 0.14 * pow(0.5 + 0.5 * sin(r * 18.0 + 0.8 * sin(phi * 2.0)), 8.0);
            float ringField = clamp(wideRings + thinRings + microRings, 0.0, 2.15);

            float slowAzimuth = 0.5 + 0.5 * sin(phi * 3.0 - uTime * omega * 2.2 + 0.45 * sin(r * 0.8));
            float fineAzimuth = 0.5 + 0.5 * sin(phi * 9.0 - uTime * omega * 4.4 + r * 0.32);
            float azimuthMod = 0.82 + 0.14 * slowAzimuth + 0.06 * fineAzimuth;
            float cleanTexture = 0.97 + 0.03 * noise(vec2(phi * 2.0, r * 1.1 - uTime * 0.08));

            float density = mainDiskWindow * (0.22 + 0.95 * ringField) * azimuthMod * cleanTexture;
            density += photonDiskWindow * (1.20 + 3.40 * photonCore) * (0.92 + 0.08 * fineAzimuth);
            density *= cleanGap;

            float temp = pow(1.0 - smoothstep(rPhoton, R_OUT, r), 1.58);
            vec3 col = mix(vec3(0.95, 0.34, 0.10), vec3(1.0, 0.70, 0.36), temp);
            col = mix(col, vec3(1.0, 0.93, 0.76), pow(temp, 2.55) * 0.70);
            col = mix(col, vec3(1.0, 0.92, 0.66), photonDiskWindow * 0.72);

            vec3 tangent = normalize(vec3(-sin(phi), 0.0, cos(phi)));

            // --------------------------------------------
            // Relativistic red/blue shift tied to mass/spin
            // --------------------------------------------
            float Mbh = 0.78 + 0.68 * uLensMass;
            float spin01 = clamp(uSpin / 1.80, 0.0, 1.0);
            float aKerr = 0.98 * spin01 * Mbh;
            float spinSign = sign(uSpin + 0.0001);

            float rH = Mbh + sqrt(max(Mbh * Mbh - aKerr * aKerr, 0.001));
            float rEff = max(r, rH + 0.18);
            float localCompactness = clamp(Mbh / max(rEff, 0.001), 0.0, 0.48);

            float betaSchw = sqrt(clamp(Mbh / max(rEff, 2.05 * Mbh), 0.0, 0.62));
            float frameDraggingBeta = 0.34 * spin01 * localCompactness * localCompactness * smoothstep(10.5, 2.7, rEff);
            float beta = clamp(betaSchw + frameDraggingBeta, 0.015, 0.78);
            float gamma = inversesqrt(max(1.0 - beta * beta, 0.04));

            float cosLOS = clamp(dot(tangent * spinSign, -rd), -0.985, 0.985);
            float doppler = 1.0 / max(gamma * (1.0 - beta * cosLOS), 0.16);

            float gravShift = sqrt(clamp(1.0 - 2.0 * Mbh / max(rEff, 2.0 * Mbh + 0.10), 0.10, 1.0));
            float gPhysical = doppler * gravShift;

            float shiftGain = 0.82 + 0.42 * uLensMass + 0.46 * spin01 * smoothstep(9.5, 3.0, rEff);
            float gShift = clamp(1.0 + (gPhysical - 1.0) * shiftGain, 0.28, 2.25);
            float intensityShift = pow(max(gShift, 0.05), 3.0);

            vec3 redShiftCol = vec3(1.0, 0.24, 0.07);
            vec3 blueShiftCol = vec3(0.62, 0.82, 1.0);

            col = mix(col, redShiftCol, smoothstep(0.96, 0.46, gShift) * (0.54 + 0.24 * uLensMass));
            col = mix(col, blueShiftCol, smoothstep(1.02, 1.62, gShift) * (0.56 + 0.30 * spin01));
            col = mix(col, vec3(1.0), smoothstep(1.24, 1.92, gShift) * 0.34);

            // --------------------------------------------
            // Rotating highlight hotspots
            // --------------------------------------------
            float orbitPhase = uTime * omega * 5.2 * spinSign;

            float h1Ang = exp(-pow(angDiff(phi, orbitPhase + 0.20) / 0.22, 2.0));
            float h1Rad = exp(-pow((r - max(mainInner + 0.8, 4.2)) / 0.55, 2.0));
            float h1 = h1Ang * h1Rad;

            float h2Ang = exp(-pow(angDiff(phi, orbitPhase + 2.15) / 0.28, 2.0));
            float h2Rad = exp(-pow((r - 6.0) / 0.85, 2.0));
            float h2 = h2Ang * h2Rad;

            float h3Ang = exp(-pow(angDiff(phi, orbitPhase + 4.10) / 0.34, 2.0));
            float h3Rad = exp(-pow((r - 8.1) / 1.05, 2.0));
            float h3 = h3Ang * h3Rad;

            float hotspot = 0.90 * h1 + 0.65 * h2 + 0.45 * h3;
            hotspot *= 0.9 + 0.1 * sin(uTime * 6.0 + r * 1.5);

            density *= 1.0 + 0.55 * hotspot;
            col = mix(col, vec3(1.0, 0.96, 0.86), clamp(hotspot, 0.0, 1.0) * 0.55);

            float beaming = 0.72 + 0.42 * intensityShift;
            float innerBright = 1.0 + 1.35 * exp(-abs(r - 3.28) * 1.75) + photonDiskWindow * 2.85;

            float alpha = density * beaming * innerBright * attenuation * (1.0 + 0.66 * order);
            alpha *= 1.18;
            alpha *= 1.0 + 0.35 * hotspot;

            return vec4(col * alpha * (2.28 + 0.72 * intensityShift + 0.60 * hotspot), alpha);
          }

          void main(){
            vec3 ro = uCameraPos;
            vec3 rd = normalize(vWorld - ro);
            vec3 p = ro;
            float prevY = p.y;
            vec4 accum = vec4(0.0);

            float M = 0.78 + 0.68 * uLensMass;
            float EH = eventHorizonRadius();

            float travel = 0.0;
            float order = 0.0;

            for(int i = 0; i < 92; i++){
              float r = length(p);
              if(r < EH) break;

              float stepLen = clamp(0.040 * r + 0.045 * travel, 0.050, 2.25);

              vec3 prev = p;
              prevY = p.y;

              vec3 radialBend = -normalize(p) * (1.65 * M / max(r * r, 0.36));
              vec3 frameDir = normalize(vec3(-p.z, 0.0, p.x) + vec3(0.0001, 0.0, 0.0));
              float frame = clamp(uSpin / 1.80, 0.0, 1.0) * M / max(r * r * r, 0.85);

              rd = normalize(rd + radialBend * stepLen + frameDir * frame * stepLen * 0.24);
              p += rd * stepLen;
              travel += stepLen;

              if((prevY > 0.0 && p.y <= 0.0) || (prevY < 0.0 && p.y >= 0.0)){
                float f = abs(prevY) / max(abs(prevY - p.y), 0.00001);
                vec3 hp = mix(prev, p, f);
                float rr = length(hp.xz);

                if(rr > photonOrbitRadius() - 2.5 * photonRingHalfWidth() && rr < R_OUT){
                  float distanceComp = 1.0 + 0.006 * min(travel, 160.0);
                  float travelFade = exp(-0.00045 * max(travel - 25.0, 0.0));
                  vec4 c = sampleDisk(hp, rd, order, distanceComp * travelFade * (1.0 - accum.a));
                  accum.rgb += c.rgb * (1.0 - accum.a);
                  accum.a += c.a * (1.0 - accum.a);
                  order += 0.72;
                  if(accum.a > 0.93) break;
                }
              }

              if(travel > 220.0) break;
            }

            if(accum.a < 0.004) discard;
            gl_FragColor = vec4(accum.rgb, clamp(accum.a, 0.0, 0.96));
          }
        `
      })
    );
    diskTracer.renderOrder = 20;
    scene.add(diskTracer);

    // -----------------------------
    // 3D spacetime grid
    // -----------------------------
    const gridGroup = new THREE.Group();
    scene.add(gridGroup);

    function makeGrid() {
      const mat = new THREE.ShaderMaterial({
        uniforms: uniforms,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexShader: `
          attribute float axisId;

          varying float vAlpha;
          varying float vR;
          varying float vAxis;

          uniform float uTime;
          uniform float uSpin;
          uniform float uFlow;
          uniform float uGridBright;

          const float EPS = 0.0001;

          float kerrR(vec3 p, float a){
            float R2 = dot(p, p);
            return sqrt(max(
              0.5 * (R2 - a*a) + 0.5 * sqrt((R2 - a*a) * (R2 - a*a) + 4.0 * a*a * p.y * p.y),
              0.001
            ));
          }

          void main(){
            vec3 p0 = position;

            float M = 0.72 + 0.70 * uFlow;
            float spin01 = clamp(uSpin / 1.80, 0.0, 1.0);
            float a = 0.98 * spin01 * M;

            float r0 = kerrR(p0, a);
            float horizon = M * (1.0 + sqrt(max(1.0 - min(a*a/(M*M), 0.999), 0.001)));

            vec3 radial0 = normalize(p0 + vec3(EPS));
            float cosTheta0 = clamp(p0.y / max(r0, EPS), -1.0, 1.0);
            float sinTheta0 = sqrt(max(1.0 - cosTheta0 * cosTheta0, 0.0));
            float rho20 = r0*r0 + a*a*cosTheta0*cosTheta0;

            // Kerr/Doran rain-frame radial fall speed
            float fallSpeed = sqrt(max(2.0 * M * r0 / max(rho20, 0.08), 0.0));
            float fallGate = smoothstep(88.0, horizon + 1.0, r0);
            fallSpeed *= fallGate;

            float streamMin = horizon + 0.55;
            float streamMax = 96.0;
            float streamSpan = streamMax - streamMin;

            float streamPhase = r0 - streamMin - uTime * uFlow * 3.15 * fallSpeed;
            float streamR = streamMin + mod(streamPhase, streamSpan);

            // far field stays Minkowski-like
            float streamBlend = smoothstep(86.0, 18.0, r0);
            float r1 = mix(r0, streamR, streamBlend);
            vec3 p = radial0 * r1;

            // recompute after advection
            float r = kerrR(p, a);
            float cosTheta = clamp(p.y / max(r, EPS), -1.0, 1.0);
            float sinTheta = sqrt(max(1.0 - cosTheta * cosTheta, 0.0));
            float rho2 = r*r + a*a*cosTheta*cosTheta;
            float Delta = r*r - 2.0*M*r + a*a;
            float Sigma2 = (r*r + a*a) * (r*r + a*a) - a*a * Delta * sinTheta * sinTheta;

            // Kerr frame dragging
            float omega = 2.0 * M * a * r / max(Sigma2, 0.25);
            float warp = smoothstep(90.0, 5.0, r);
            float equatorWeight = pow(sinTheta, 1.35);
            float dragAngle = uTime * omega * 18.0 * warp * equatorWeight;
            float ca = cos(dragAngle);
            float sa = sin(dragAngle);
            p.xz = mat2(ca, -sa, sa, ca) * p.xz;

            // additional near-hole squeeze
            float lapseLike = sqrt(max(2.0 * M * r / max(rho2, 0.08), 0.0));
            vec3 radial = normalize(p + vec3(EPS));
            float extraFall = warp * lapseLike * 0.34 / max(r - horizon + 1.35, 0.35);
            extraFall = min(extraFall, max(r - horizon - 0.18, 0.0));
            p -= radial * extraFall;

            float polarFlatten = warp * lapseLike * 0.035 * equatorWeight;
            p.y *= 1.0 - polarFlatten;

            r = kerrR(p, a);

            float horizonMask = smoothstep(horizon + 0.35, horizon + 1.25, r);
            float pileupComp = clamp((r1 * r1) / max(r0 * r0, 1.0), 0.10, 1.0);
            float near = smoothstep(68.0, 4.0, r);

            // camera-distance fade to reduce visual overload
            float viewDist = length(p - cameraPosition);
            float viewFade = 1.0 - smoothstep(72.0, 118.0, viewDist);

            vR = r;
            vAxis = axisId;
            vAlpha = uGridBright * horizonMask * pileupComp * viewFade * (0.14 + 0.48 * near);

            gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
          }
        `,
        fragmentShader: `
          varying float vAlpha;
          varying float vR;
          varying float vAxis;

          void main(){
            vec3 cx = vec3(0.50, 0.78, 1.0);
            vec3 cy = vec3(1.0, 0.68, 0.38);
            vec3 cz = vec3(0.66, 1.0, 0.86);

            vec3 col = vAxis < 0.5 ? cx : (vAxis < 1.5 ? cy : cz);
            col = mix(col * 0.64, vec3(0.96, 0.99, 1.0), smoothstep(18.0, 2.5, vR));

            gl_FragColor = vec4(col, clamp(vAlpha, 0.0, 0.76));
          }
        `
      });

      const extent = 96;
      const step = 16;
      const div = 78;

      const verts = [];
      const axes = [];

      function pushVertex(x, y, z, axis) {
        verts.push(x, y, z);
        axes.push(axis);
      }

      function addSegmented(axis, A, B) {
        for (let i = 0; i < div; i++) {
          const u0 = -extent + 2 * extent * i / div;
          const u1 = -extent + 2 * extent * (i + 1) / div;

          if (axis === 0) {
            pushVertex(u0, A, B, axis);
            pushVertex(u1, A, B, axis);
          } else if (axis === 1) {
            pushVertex(A, u0, B, axis);
            pushVertex(A, u1, B, axis);
          } else {
            pushVertex(A, B, u0, axis);
            pushVertex(A, B, u1, axis);
          }
        }
      }

      const coords = [];
      for (let v = -extent; v <= extent + 0.001; v += step) coords.push(v);

      for (const y of coords) for (const z of coords) addSegmented(0, y, z);
      for (const x of coords) for (const z of coords) addSegmented(1, x, z);
      for (const x of coords) for (const y of coords) addSegmented(2, x, y);

      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.Float32BufferAttribute(verts, 3));
      geo.setAttribute("axisId", new THREE.Float32BufferAttribute(axes, 1));

      return new THREE.LineSegments(geo, mat);
    }

    gridGroup.add(makeGrid());

    // -----------------------------
    // Test particles
    // -----------------------------
    const particleGroup = new THREE.Group();
    scene.add(particleGroup);

    const COUNT = 180;
    const STEPS = 16;

    const pointPositions = new Float32Array(COUNT * 3);
    const pointGeo = new THREE.BufferGeometry();
    pointGeo.setAttribute("position", new THREE.BufferAttribute(pointPositions, 3));

    const pointMat = new THREE.PointsMaterial({
      size: 0.18,
      color: 0xcfe8ff,
      transparent: true,
      opacity: 0.92,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const particlePoints = new THREE.Points(pointGeo, pointMat);
    particleGroup.add(particlePoints);

    const segCount = COUNT * (STEPS - 1);
    const trailPositions = new Float32Array(segCount * 2 * 3);
    const trailAlpha = new Float32Array(segCount * 2);
    const trailGeo = new THREE.BufferGeometry();
    trailGeo.setAttribute("position", new THREE.BufferAttribute(trailPositions, 3));
    trailGeo.setAttribute("aAlpha", new THREE.BufferAttribute(trailAlpha, 1));

    const trailMat = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexShader: `
        attribute float aAlpha;
        varying float vA;
        void main(){
          vA = aAlpha;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying float vA;
        void main(){
          gl_FragColor = vec4(0.76, 0.88, 1.0, vA * 0.34);
        }
      `
    });
    const trailLines = new THREE.LineSegments(trailGeo, trailMat);
    particleGroup.add(trailLines);

    const particles = [];

    function resetParticle(p) {
      const r = 24 + Math.random() * 42;
      const a = Math.random() * Math.PI * 2;
      const y = (Math.random() - 0.5) * 14;
      p.pos.set(Math.cos(a) * r, y, Math.sin(a) * r);
      p.vel.set(-Math.sin(a), (Math.random() - 0.5) * 0.03, Math.cos(a))
        .multiplyScalar(0.05 + Math.random() * 0.07);

      for (let i = 0; i < STEPS; i++) p.hist[i].copy(p.pos);
    }

    for (let i = 0; i < COUNT; i++) {
      const p = {
        pos: new THREE.Vector3(),
        vel: new THREE.Vector3(),
        hist: Array.from({ length: STEPS }, () => new THREE.Vector3())
      };
      resetParticle(p);
      particles.push(p);
    }

    function updateParticles(dt) {
      if (!params.particles) return;
      if (dt <= 0.0001) return;

      const h = Math.min(dt, 0.032);
      const M = 18 * params.mass;
      const spin01 = Math.max(0, Math.min(1, params.spin / 1.8));
      const soft = 2.15;

      for (let i = 0; i < COUNT; i++) {
        const p = particles[i];
        const r = p.pos.length() + 0.0001;
        const rp = Math.sqrt(p.pos.x * p.pos.x + p.pos.z * p.pos.z) + 0.001;

        const radial = p.pos.clone().multiplyScalar(-1 / r);
        const tangent = new THREE.Vector3(-p.pos.z / rp, 0, p.pos.x / rp);

        const inv = 1 / (r * r + soft * soft);
        const fall = params.mass * 0.62;
        const drag = spin01 * 0.52;

        p.vel.add(radial.multiplyScalar(M * inv * h * fall));
        p.vel.add(tangent.multiplyScalar(M * inv * h * drag / Math.sqrt(r + 0.7)));
        p.vel.multiplyScalar(0.9992);

        p.pos.addScaledVector(p.vel, h * 18);

        if (r < 2.35 || r > 120 || !Number.isFinite(p.pos.x)) {
          resetParticle(p);
        }

        p.hist.pop();
        p.hist.unshift(p.pos.clone());

        pointPositions[i * 3 + 0] = p.pos.x;
        pointPositions[i * 3 + 1] = p.pos.y;
        pointPositions[i * 3 + 2] = p.pos.z;
      }

      let segIndex = 0;
      for (let i = 0; i < COUNT; i++) {
        const hst = particles[i].hist;
        for (let j = 0; j < STEPS - 1; j++) {
          const a = hst[j];
          const b = hst[j + 1];

          const baseP = segIndex * 6;
          trailPositions[baseP + 0] = a.x;
          trailPositions[baseP + 1] = a.y;
          trailPositions[baseP + 2] = a.z;
          trailPositions[baseP + 3] = b.x;
          trailPositions[baseP + 4] = b.y;
          trailPositions[baseP + 5] = b.z;

          const alpha = (1 - j / (STEPS - 1)) * 0.9;
          trailAlpha[segIndex * 2 + 0] = alpha;
          trailAlpha[segIndex * 2 + 1] = alpha * 0.78;
          segIndex++;
        }
      }

      pointGeo.attributes.position.needsUpdate = true;
      trailGeo.attributes.position.needsUpdate = true;
      trailGeo.attributes.aAlpha.needsUpdate = true;
    }

    // -----------------------------
    // UI bindings
    // -----------------------------
    function bindSwitch(id, key, target) {
      const el = document.getElementById(id);
      el.addEventListener("click", () => {
        params[key] = !params[key];
        el.classList.toggle("on", params[key]);
        target.visible = params[key];
      });
    }

    function bindSlider(id, valueId, key, uniformA = null, uniformB = null) {
      const input = document.getElementById(id);
      const value = document.getElementById(valueId);

      input.addEventListener("input", () => {
        params[key] = Number(input.value);
        value.textContent = params[key].toFixed(2);
        if (uniformA) uniformA.value = params[key];
        if (uniformB) uniformB.value = params[key];
      });
    }

    bindSwitch("gridToggle", "grid", gridGroup);
    bindSwitch("particleToggle", "particles", particleGroup);

    bindSlider("massSlider", "massValue", "mass", uniforms.uLensMass, uniforms.uFlow);
    bindSlider("spinSlider", "spinValue", "spin", uniforms.uSpin);
    bindSlider("timeSlider", "timeValue", "timeScale", null);
    bindSlider("gridBrightSlider", "gridBrightValue", "gridBright", uniforms.uGridBright);

    // -----------------------------
    // Resize
    // -----------------------------
    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, innerWidth < 760 ? 1.10 : 1.25));
    });

    // -----------------------------
    // Animation
    // -----------------------------
    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta() * params.timeScale;
      uniforms.uTime.value += dt;
      uniforms.uCameraPos.value.copy(camera.position);

      const eventHorizonScale = 0.72 + 0.30 * params.mass;
      const apparentShadowScale = 2.598076 * eventHorizonScale;
      horizon.scale.setScalar(apparentShadowScale);

      diskTracer.position.set(0, 0, 0);
      diskTracer.lookAt(camera.position);

      const tracerDist = camera.position.distanceTo(diskTracer.position);
      const fovRad = THREE.MathUtils.degToRad(camera.fov);
      const frustumHeight = 2 * tracerDist * Math.tan(fovRad * 0.5);
      const coverSize = frustumHeight * Math.max(camera.aspect, 1.0) * 1.28;
      diskTracer.scale.setScalar(coverSize / 120);

      updateParticles(dt);

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
